<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>color picker — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool styles */
  .picker-row { display:flex; align-items:center; gap:16px; margin-bottom:24px; }
  input[type="color"] { width:64px; height:64px; border:1px solid hsl(var(--border)); border-radius:4px; background:none; cursor:pointer; padding:2px; }
  .text-input { flex:1; font-family:var(--mono); font-size:14px; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 12px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  .text-input:focus { border-color:hsl(var(--fg-dim)); }
  .swatch { width:64px; height:64px; border-radius:4px; border:1px solid hsl(var(--border)); flex-shrink:0; }
  .formats { display:flex; flex-direction:column; gap:0; border:1px solid hsl(var(--border)); border-radius:4px; overflow:hidden; }
  .fmt-row { display:flex; align-items:center; gap:0; border-bottom:1px solid hsl(var(--rule)); }
  .fmt-row:last-child { border-bottom:none; }
  .fmt-label { font-family:var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); padding:10px 14px; width:72px; flex-shrink:0; border-right:1px solid hsl(var(--rule)); }
  .fmt-val { font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); padding:10px 14px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fmt-copy { appearance:none; background:transparent; border:none; color:hsl(var(--muted-fg)); cursor:pointer; padding:8px 12px; display:flex; align-items:center; transition:color 120ms ease; flex-shrink:0; }
  .fmt-copy:hover { color:hsl(var(--fg)); }
  .fmt-copy svg { width:14px; height:14px; }
  .parse-error { font-family:var(--mono); font-size:12px; color:hsl(0 50% 55%); margin-top:6px; min-height:18px; }
</style>
</head>
<body>
<div class="page">
 <div class="grow">
 <main class="shell">
  <div class="nav">
    <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
    <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
  </div>
  <div class="head">
    <h1>color picker</h1>
    <p>hex, rgb, hsl, hsv, oklch</p>
  </div>

  <div class="picker-row">
    <input type="color" id="colorNative" value="#3b82f6" aria-label="Pick a color">
    <input type="text" class="text-input" id="colorText" value="#3b82f6" placeholder="#rrggbb or rgb() or hsl()..." spellcheck="false">
    <div class="swatch" id="swatch"></div>
  </div>
  <div class="parse-error" id="parseError"></div>

  <div class="formats" id="formats">
    <div class="fmt-row">
      <span class="fmt-label">HEX</span>
      <span class="fmt-val" id="fHex"></span>
      <button class="fmt-copy" data-fmt="fHex" aria-label="Copy HEX"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
    <div class="fmt-row">
      <span class="fmt-label">HEX-S</span>
      <span class="fmt-val" id="fHexS"></span>
      <button class="fmt-copy" data-fmt="fHexS" aria-label="Copy short HEX"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
    <div class="fmt-row">
      <span class="fmt-label">RGB</span>
      <span class="fmt-val" id="fRgb"></span>
      <button class="fmt-copy" data-fmt="fRgb" aria-label="Copy RGB"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
    <div class="fmt-row">
      <span class="fmt-label">HSL</span>
      <span class="fmt-val" id="fHsl"></span>
      <button class="fmt-copy" data-fmt="fHsl" aria-label="Copy HSL"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
    <div class="fmt-row">
      <span class="fmt-label">HSV</span>
      <span class="fmt-val" id="fHsv"></span>
      <button class="fmt-copy" data-fmt="fHsv" aria-label="Copy HSV"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
    <div class="fmt-row">
      <span class="fmt-label">OKLCH</span>
      <span class="fmt-val" id="fOklch"></span>
      <button class="fmt-copy" data-fmt="fOklch" aria-label="Copy OKLCH"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
    </div>
  </div>
 </main>
 </div>

 <footer>
  <div class="foot-inner">
    <span>color picker</span>
    <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
  </div>
 </footer>
</div>

<script>
(function(){
  var btn=document.querySelector('[data-theme-toggle]');
  function pl(){var d=document.documentElement.classList.contains('dark');btn.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}
  pl();btn.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}pl();});
})();

(function(){
  var native=document.getElementById('colorNative');
  var text=document.getElementById('colorText');
  var swatch=document.getElementById('swatch');
  var errEl=document.getElementById('parseError');

  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function r2(v){return Math.round(v*100)/100;}

  function hexToRgb(hex){
    hex=hex.trim().replace('#','');
    if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    if(hex.length!==6) return null;
    var n=parseInt(hex,16);
    if(isNaN(n)) return null;
    return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
  }
  function parseRgb(s){
    var m=s.match(/rgba?\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)/i);
    if(!m) return null;
    return {r:clamp(Math.round(parseFloat(m[1])),0,255),g:clamp(Math.round(parseFloat(m[2])),0,255),b:clamp(Math.round(parseFloat(m[3])),0,255)};
  }
  function hslToRgb(h,s,l){
    s/=100;l/=100;
    var k=function(n){return(n+h/30)%12;};
    var a=s*Math.min(l,1-l);
    var f=function(n){return l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));};
    return {r:Math.round(f(0)*255),g:Math.round(f(8)*255),b:Math.round(f(4)*255)};
  }
  function parseHsl(s){
    var m=s.match(/hsla?\(\s*([\d.]+)\s*,\s*([\d.]+)%?\s*,\s*([\d.]+)%?/i);
    if(!m) return null;
    return hslToRgb(parseFloat(m[1]),parseFloat(m[2]),parseFloat(m[3]));
  }
  function parseColor(s){
    s=s.trim();
    if(s.startsWith('#')) return hexToRgb(s);
    if(/^rgb/i.test(s)) return parseRgb(s);
    if(/^hsl/i.test(s)) return parseHsl(s);
    if(/^[0-9a-f]{3,6}$/i.test(s)) return hexToRgb('#'+s);
    return null;
  }

  function toHex(r,g,b){return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');}
  function toHexShort(hex){
    var h=hex.replace('#','');
    if(h[0]===h[1]&&h[2]===h[3]&&h[4]===h[5]) return '#'+h[0]+h[2]+h[4];
    return hex;
  }
  function toRgb(r,g,b){return 'rgb('+r+', '+g+', '+b+')';}
  function toHslStr(r,g,b){
    r/=255;g/=255;b/=255;
    var max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h,s,l=(max+min)/2;
    if(d===0){h=s=0;}else{s=d/(1-Math.abs(2*l-1));switch(max){case r:h=((g-b)/d+6)%6;break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h=Math.round(h*60);}
    return 'hsl('+h+', '+Math.round(s*100)+'%, '+Math.round(l*100)+'%)';
  }
  function toHsvStr(r,g,b){
    r/=255;g/=255;b/=255;
    var max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h,s=max===0?0:d/max,v=max;
    if(d===0){h=0;}else{switch(max){case r:h=((g-b)/d+6)%6;break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h=Math.round(h*60);}
    return 'hsv('+h+', '+Math.round(s*100)+'%, '+Math.round(v*100)+'%)';
  }
  function toOklch(r,g,b){
    // sRGB -> linear
    function lin(c){c/=255;return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
    var lr=lin(r),lg=lin(g),lb=lin(b);
    // linear sRGB -> OKLab
    var l=0.4122214708*lr+0.5363325363*lg+0.0514459929*lb;
    var m=0.2119034982*lr+0.6806995451*lg+0.1073969566*lb;
    var s=0.0883024619*lr+0.2817188376*lg+0.6299787005*lb;
    l=Math.cbrt(l);m=Math.cbrt(m);s=Math.cbrt(s);
    var L=0.2104542553*l+0.7936177850*m-0.0040720468*s;
    var a=1.9779984951*l-2.4285922050*m+0.4505937099*s;
    var bb=-0.0259040371*l+0.4072394816*m-0.6312432910*s; // renamed to bb
    var C=Math.sqrt(a*a+bb*bb);
    var H=Math.atan2(bb,a)*180/Math.PI;
    if(H<0)H+=360;
    return 'oklch('+r2(L)+' '+r2(C)+' '+Math.round(H)+')';
  }

  function update(rgb, skipNative, skipText){
    var hex=toHex(rgb.r,rgb.g,rgb.b);
    swatch.style.background=hex;
    if(!skipNative) native.value=hex;
    if(!skipText) text.value=hex;
    document.getElementById('fHex').textContent=hex;
    var s=toHexShort(hex);
    document.getElementById('fHexS').textContent=s===hex?'— (not collapsible)':s;
    document.getElementById('fRgb').textContent=toRgb(rgb.r,rgb.g,rgb.b);
    document.getElementById('fHsl').textContent=toHslStr(rgb.r,rgb.g,rgb.b);
    document.getElementById('fHsv').textContent=toHsvStr(rgb.r,rgb.g,rgb.b);
    document.getElementById('fOklch').textContent=toOklch(rgb.r,rgb.g,rgb.b);
  }

  native.addEventListener('input',function(){
    errEl.textContent='';
    var rgb=hexToRgb(native.value);
    if(rgb) update(rgb,true,false);
  });
  text.addEventListener('input',function(){
    var rgb=parseColor(text.value);
    if(rgb){errEl.textContent='';update(rgb,false,true);}
    else{errEl.textContent=text.value.length>0?'unrecognized format':'';}
  });

  document.querySelectorAll('.fmt-copy').forEach(function(btn){
    btn.addEventListener('click',function(){
      var el=document.getElementById(btn.dataset.fmt);
      var val=el.textContent;
      if(val.startsWith('—')) return;
      navigator.clipboard.writeText(val).then(function(){
        var orig=btn.innerHTML;
        btn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(function(){btn.innerHTML=orig;},900);
      });
    });
  });

  update({r:59,g:130,b:246},true,true);
})();
</script>
</body>
</html>
