<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>clipboard viewer — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool */
  .read-btn { appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); color:hsl(var(--fg)); padding:10px 20px; font-family:var(--mono); font-size:13px; border-radius:4px; cursor:pointer; transition:background 120ms ease, border-color 120ms ease; }
  .read-btn:hover { border-color:hsl(var(--fg-dim)); }
  .status { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); margin-top:10px; min-height:20px; }
  .tabs { display:flex; gap:0; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; margin:20px 0 12px; flex-wrap:wrap; }
  .tab-btn { appearance:none; background:transparent; border:none; padding:6px 12px; font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .tab-btn[aria-selected="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  .panel { display:none; }
  .panel.active { display:block; }
  pre { background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:12px; line-height:1.65; overflow-x:auto; white-space:pre-wrap; word-break:break-all; max-height:400px; overflow-y:auto; }
  .html-toggle { display:flex; gap:0; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; margin-bottom:10px; }
  .html-view-btn { appearance:none; background:transparent; border:none; padding:5px 10px; font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .html-view-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  .rendered-html { background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:14px; max-height:400px; overflow:auto; font-size:14px; }
  .img-preview { max-width:100%; border-radius:4px; border:1px solid hsl(var(--border)); display:block; }
  .img-dims { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); margin-top:8px; }
  .notice { font-family:var(--mono); font-size:13px; color:hsl(var(--muted-fg)); padding:12px 0; }
</style>
</head>
<body>
<div class="page">
 <div class="grow">
 <main class="shell">
  <div class="nav">
    <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
    <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
  </div>
  <div class="head">
    <h1>clipboard viewer</h1>
    <p>inspect every mime type on the clipboard</p>
  </div>

  <button class="read-btn" id="readBtn">read clipboard</button>
  <div class="status" id="status"></div>
  <div id="content" style="display:none">
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
  </div>
 </main>
 </div>

 <footer>
  <div class="foot-inner">
    <span>clipboard viewer</span>
    <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
  </div>
 </footer>
</div>

<script>
(function(){
  var btn=document.querySelector('[data-theme-toggle]');
  function pl(){var d=document.documentElement.classList.contains('dark');btn.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}
  pl();btn.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}pl();});
})();

(function(){
  var readBtn=document.getElementById('readBtn');
  var status=document.getElementById('status');
  var content=document.getElementById('content');
  var tabsEl=document.getElementById('tabs');
  var panelsEl=document.getElementById('panels');

  function showStatus(msg){status.textContent=msg;}

  function switchTab(idx){
    tabsEl.querySelectorAll('.tab-btn').forEach(function(b,i){b.setAttribute('aria-selected',i===idx);});
    panelsEl.querySelectorAll('.panel').forEach(function(p,i){p.classList.toggle('active',i===idx);});
  }

  function buildTextPanel(text){
    var pre=document.createElement('pre');
    pre.textContent=text;
    return pre;
  }

  function buildHtmlPanel(html){
    var wrap=document.createElement('div');
    var tgl=document.createElement('div');
    tgl.className='html-toggle';
    var rawBtn=document.createElement('button');rawBtn.className='html-view-btn';rawBtn.textContent='raw';rawBtn.setAttribute('aria-pressed','true');
    var rendBtn=document.createElement('button');rendBtn.className='html-view-btn';rendBtn.textContent='rendered';rendBtn.setAttribute('aria-pressed','false');
    tgl.appendChild(rawBtn);tgl.appendChild(rendBtn);

    var rawView=document.createElement('pre');rawView.textContent=html;
    var rendView=document.createElement('div');rendView.className='rendered-html';rendView.style.display='none';
    // render HTML safely in an isolated way
    var shadow=rendView.attachShadow?rendView.attachShadow({mode:'open'}):null;
    if(shadow){shadow.innerHTML=html;}else{rendView.innerHTML=html;}

    rawBtn.addEventListener('click',function(){
      rawBtn.setAttribute('aria-pressed','true');rendBtn.setAttribute('aria-pressed','false');
      rawView.style.display='';rendView.style.display='none';
    });
    rendBtn.addEventListener('click',function(){
      rawBtn.setAttribute('aria-pressed','false');rendBtn.setAttribute('aria-pressed','true');
      rawView.style.display='none';rendView.style.display='';
    });

    wrap.appendChild(tgl);wrap.appendChild(rawView);wrap.appendChild(rendView);
    return wrap;
  }

  function buildImagePanel(blob){
    var wrap=document.createElement('div');
    var url=URL.createObjectURL(blob);
    var img=document.createElement('img');
    img.className='img-preview';
    img.src=url;
    var dims=document.createElement('p');dims.className='img-dims';dims.textContent='loading…';
    img.onload=function(){dims.textContent=img.naturalWidth+' × '+img.naturalHeight+' px — '+blob.type;};
    wrap.appendChild(img);wrap.appendChild(dims);
    return wrap;
  }

  function buildGenericPanel(blob){
    var pre=document.createElement('pre');
    var reader=new FileReader();
    reader.onload=function(){
      var arr=new Uint8Array(reader.result);
      var hex=Array.from(arr.slice(0,512)).map(function(b){return b.toString(16).padStart(2,'0');}).join(' ');
      pre.textContent=hex+(arr.length>512?'\n… (truncated)':'');
    };
    reader.readAsArrayBuffer(blob);
    return pre;
  }

  readBtn.addEventListener('click',function(){
    if(!navigator.clipboard||!navigator.clipboard.read){
      showStatus('clipboard API not available in this browser');return;
    }
    showStatus('requesting clipboard access…');
    navigator.clipboard.read().then(function(items){
      if(!items||items.length===0){showStatus('clipboard is empty');content.style.display='none';return;}
      tabsEl.innerHTML='';panelsEl.innerHTML='';
      var promises=[];
      var item=items[0]; // show first clipboard item
      var types=item.types;
      showStatus(types.length+' type'+(types.length===1?'':'s')+' found');
      content.style.display='block';

      types.forEach(function(type,idx){
        var tabBtn=document.createElement('button');
        tabBtn.className='tab-btn';
        tabBtn.textContent=type;
        tabBtn.setAttribute('aria-selected',idx===0);
        tabBtn.addEventListener('click',function(){switchTab(idx);});
        tabsEl.appendChild(tabBtn);

        var panel=document.createElement('div');
        panel.className='panel'+(idx===0?' active':'');
        panelsEl.appendChild(panel);

        var p=item.getType(type).then(function(blob){
          var node;
          if(type==='text/plain'){
            return blob.text().then(function(t){panel.appendChild(buildTextPanel(t));});
          } else if(type==='text/html'){
            return blob.text().then(function(t){panel.appendChild(buildHtmlPanel(t));});
          } else if(type.startsWith('image/')){
            panel.appendChild(buildImagePanel(blob));
          } else {
            panel.appendChild(buildGenericPanel(blob));
          }
        }).catch(function(e){
          var p=document.createElement('p');p.className='notice';p.textContent='could not read this type: '+e.message;
          panel.appendChild(p);
        });
        promises.push(p);
      });
    }).catch(function(e){
      if(e.name==='NotAllowedError'){showStatus('permission denied — allow clipboard access in browser settings');}
      else{showStatus('error: '+e.message);}
      content.style.display='none';
    });
  });
})();
</script>
</body>
</html>
