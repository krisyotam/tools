<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>lorem ipsum — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  .controls { display:grid; grid-template-columns: 100px 1fr; gap:14px 18px; align-items:center; margin-bottom:18px; }
  label.lbl-inline { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); }
  input[type=number] { appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:8px 10px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); width:100%; outline:none; transition:border-color 150ms ease; }
  input[type=number]:focus { border-color:hsl(var(--fg-dim)); }
  .modes { display:flex; gap:0; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; }
  .mode-btn { appearance:none; background:transparent; border:none; padding:6px 14px; font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .mode-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:18px 0 6px; }
  textarea { width:100%; min-height:220px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:13px; line-height:1.65; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  .actions { display:flex; gap:8px; margin-top:8px; }
  .btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:6px 12px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .controls { grid-template-columns: 1fr; gap:8px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>lorem ipsum</h1>
      <p>placeholder text generator</p>
    </div>

    <div class="controls">
      <label class="lbl-inline">count</label>
      <input id="count" type="number" min="1" max="500" value="5">
      <label class="lbl-inline">unit</label>
      <div class="modes" role="tablist">
        <button class="mode-btn" data-mode="paragraphs" aria-pressed="true">paragraphs</button>
        <button class="mode-btn" data-mode="sentences" aria-pressed="false">sentences</button>
        <button class="mode-btn" data-mode="words" aria-pressed="false">words</button>
      </div>
    </div>

    <label class="lbl" for="out">output</label>
    <textarea id="out" readonly></textarea>
    <div class="actions">
      <button class="btn" id="regen">regenerate</button>
      <button class="btn" id="copy">copy</button>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>lorem ipsum</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    // Word pool drawn from the classical Cicero-derived corpus
    var WORDS = ('lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum at vero eos accusamus iusto odio dignissimos ducimus blanditiis praesentium voluptatum deleniti atque corrupti quos quas molestias excepturi obcaecati cupiditate provident similique mollitia animi laborum dolorum fuga harum quidem rerum facilis expedita distinctio nam libero tempore cum soluta nobis eligendi optio cumque nihil impedit quo placeat facere possimus omnis assumenda repellendus temporibus quibusdam officiis debitis aut earum hic tenetur a sapiente delectus reiciendis maiores alias perferendis doloribus asperiores repellat quasi architecto beatae vitae dicta sunt explicabo nemo ipsam quia voluptas aspernatur aut fuga consequuntur magni dolores eos ratione sequi nesciunt neque porro quisquam est dolorem adipisci numquam eius modi tempora incidunt magnam aliquam quaerat minima nostrum exercitationem ullam corporis suscipit laboriosam aliquid commodi consequatur autem vel eum iure voluptate esse quam molestiae').split(' ');

    var SEED = 'lorem ipsum dolor sit amet consectetur adipiscing elit'.split(' ');

    var countEl = document.getElementById('count');
    var outEl   = document.getElementById('out');
    var regen   = document.getElementById('regen');
    var copy    = document.getElementById('copy');
    var mode    = 'paragraphs';

    function rand(n){ return Math.floor(Math.random()*n); }
    function pick(){ return WORDS[rand(WORDS.length)]; }

    function makeSentence(useSeed) {
      var len = 6 + rand(14); // 6-19 words
      var parts = [];
      if (useSeed) { parts = SEED.slice(0, Math.min(SEED.length, len)); }
      while (parts.length < len) parts.push(pick());
      // sprinkle commas
      for (var i = 2; i < parts.length - 2; i++) {
        if (rand(8) === 0) parts[i] = parts[i] + ',';
      }
      parts[0] = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
      return parts.join(' ') + '.';
    }
    function makeParagraph(useSeed) {
      var n = 3 + rand(5); // 3-7 sentences
      var out = [];
      for (var i = 0; i < n; i++) out.push(makeSentence(useSeed && i === 0));
      return out.join(' ');
    }

    function generate() {
      var n = Math.max(1, Math.min(500, parseInt(countEl.value, 10) || 1));
      var out = '';
      if (mode === 'words') {
        var words = [];
        words.push.apply(words, SEED.slice(0, Math.min(SEED.length, n)));
        while (words.length < n) words.push(pick());
        words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
        out = words.join(' ') + '.';
      } else if (mode === 'sentences') {
        var s = [];
        for (var i = 0; i < n; i++) s.push(makeSentence(i === 0));
        out = s.join(' ');
      } else {
        var p = [];
        for (var j = 0; j < n; j++) p.push(makeParagraph(j === 0));
        out = p.join('\n\n');
      }
      outEl.value = out;
    }

    countEl.addEventListener('input', generate);
    document.querySelectorAll('.mode-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(function (b) { b.setAttribute('aria-pressed', b === btn); });
        generate();
      });
    });
    regen.addEventListener('click', generate);
    copy.addEventListener('click', function () {
      navigator.clipboard.writeText(outEl.value).then(function () {
        var o = copy.textContent; copy.textContent = 'copied'; setTimeout(function () { copy.textContent = o; }, 900);
      });
    });

    generate();
  })();
</script>
</body>
</html>
