<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hex converter — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  .input-wrap { margin-bottom:8px; }
  .lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:6px; }
  input[type="text"] { width:100%; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:15px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  input[type="text"]:focus { border-color:hsl(var(--fg-dim)); }
  input[type="text"]::placeholder { color:hsl(var(--muted-fg)); }
  .hint { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin-bottom:20px; }

  .rows { border-top:1px solid hsl(var(--rule)); margin-top:16px; }
  .conv-row { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid hsl(var(--rule)); }
  .conv-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); min-width:56px; }
  .conv-val { font-family:var(--mono); font-size:14px; color:hsl(var(--fg)); flex:1; word-break:break-all; }
  .conv-val.invalid { color:hsl(0 60% 55%); }
  .copy-icon { appearance:none; background:transparent; border:none; color:hsl(var(--muted-fg)); cursor:pointer; padding:2px 4px; border-radius:3px; display:inline-flex; align-items:center; transition:color 120ms ease; }
  .copy-icon:hover { color:hsl(var(--fg)); }
  .copy-icon svg { width:14px; height:14px; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .conv-val { font-size:12px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>hex converter</h1>
      <p>binary, octal, decimal, hex</p>
    </div>

    <div class="input-wrap">
      <label class="lbl" for="num-in">number (auto-detect base from prefix)</label>
      <input type="text" id="num-in" placeholder="0xff  or  0b1010  or  0o17  or  255" autofocus autocomplete="off" spellcheck="false">
    </div>
    <div class="hint">prefix: <span style="font-family:var(--mono)">0x</span> hex &nbsp;·&nbsp; <span style="font-family:var(--mono)">0b</span> binary &nbsp;·&nbsp; <span style="font-family:var(--mono)">0o</span> octal &nbsp;·&nbsp; plain = decimal</div>

    <div class="rows" id="rows">
      <div class="conv-row">
        <span class="conv-label">binary</span>
        <span class="conv-val" id="out-bin">—</span>
        <button class="copy-icon" data-target="out-bin" aria-label="Copy binary"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
      </div>
      <div class="conv-row">
        <span class="conv-label">octal</span>
        <span class="conv-val" id="out-oct">—</span>
        <button class="copy-icon" data-target="out-oct" aria-label="Copy octal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
      </div>
      <div class="conv-row">
        <span class="conv-label">decimal</span>
        <span class="conv-val" id="out-dec">—</span>
        <button class="copy-icon" data-target="out-dec" aria-label="Copy decimal"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
      </div>
      <div class="conv-row">
        <span class="conv-label">hex</span>
        <span class="conv-val" id="out-hex">—</span>
        <button class="copy-icon" data-target="out-hex" aria-label="Copy hex"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg></button>
      </div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>hex converter</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var inp = document.getElementById('num-in');
    var outBin = document.getElementById('out-bin');
    var outOct = document.getElementById('out-oct');
    var outDec = document.getElementById('out-dec');
    var outHex = document.getElementById('out-hex');

    function parse(s) {
      s = s.trim();
      if (!s) return null;
      var neg = s[0] === '-';
      var abs = neg ? s.slice(1) : s;
      var val;
      if (/^0x/i.test(abs)) {
        if (!/^0x[0-9a-f]+$/i.test(abs)) return undefined;
        val = BigInt(abs);
      } else if (/^0b/i.test(abs)) {
        if (!/^0b[01]+$/i.test(abs)) return undefined;
        val = BigInt(abs);
      } else if (/^0o/i.test(abs)) {
        if (!/^0o[0-7]+$/i.test(abs)) return undefined;
        val = BigInt(abs);
      } else {
        if (!/^[0-9]+$/.test(abs)) return undefined;
        val = BigInt(abs);
      }
      return neg ? -val : val;
    }

    function convert() {
      var s = inp.value;
      if (!s.trim()) {
        [outBin, outOct, outDec, outHex].forEach(function(el){ el.textContent = '—'; el.className = 'conv-val'; });
        return;
      }
      var val = parse(s);
      if (val === undefined || val === null) {
        [outBin, outOct, outDec, outHex].forEach(function(el){ el.textContent = 'invalid'; el.className = 'conv-val invalid'; });
        return;
      }
      var neg = val < 0n;
      var abs = neg ? -val : val;
      var prefix = neg ? '-' : '';
      outBin.textContent = prefix + '0b' + abs.toString(2);
      outOct.textContent = prefix + '0o' + abs.toString(8);
      outDec.textContent = val.toString(10);
      outHex.textContent = prefix + '0x' + abs.toString(16).toUpperCase();
      [outBin, outOct, outDec, outHex].forEach(function(el){ el.className = 'conv-val'; });
    }

    inp.addEventListener('input', convert);
    convert();

    document.querySelectorAll('.copy-icon').forEach(function(btn) {
      btn.addEventListener('click', function(){
        var target = document.getElementById(btn.dataset.target);
        var txt = target.textContent;
        if (txt === '—' || txt === 'invalid') return;
        navigator.clipboard.writeText(txt).then(function(){
          btn.style.color = 'hsl(var(--fg))';
          setTimeout(function(){ btn.style.color = ''; }, 900);
        });
      });
    });
  })();
</script>
</body>
</html>
