<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  input[type="text"] { width:100%; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:14px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  input:focus { border-color:hsl(var(--fg-dim)); }
  input::placeholder { color:hsl(var(--muted-fg)); }
  .hint { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin-top:6px; margin-bottom:20px; }
  .results { margin-top:4px; }
  .result-item { display:grid; grid-template-columns:48px 1fr; gap:0 16px; align-items:start; padding:14px 0; border-bottom:1px solid hsl(var(--border)); }
  .result-item:last-child { border-bottom:none; }
  .glyph { font-size:32px; line-height:1; grid-row:1/3; align-self:center; }
  .cp { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin-bottom:2px; }
  .name { font-family:var(--serif); font-size:14px; font-weight:500; color:hsl(var(--fg)); margin-bottom:2px; }
  .meta { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); }
  .empty { font-family:var(--mono); font-size:13px; color:hsl(var(--muted-fg)); padding:20px 0; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .glyph { font-size:24px; } }

  (function () {
    var q = document.getElementById('q');
    var results = document.getElementById('results');

    function cpStr(cp) {
      return 'U+' + cp.toString(16).toUpperCase().padStart(4, '0');
    }

    function glyph(cp) {
      try { return String.fromCodePoint(cp); } catch (e) { return '?'; }
    }

    function render(matches) {
      if (!matches.length) {
        results.innerHTML = '<div class="empty">no matches</div>';
        return;
      }
      var html = '';
      var shown = matches.slice(0, 40);
      shown.forEach(function (row) {
        var cp = row[0], name = row[1], block = row[2], cat = row[3];
        var g = glyph(cp);
        html += '<div class="result-item">';
        html += '<div class="glyph">' + g + '</div>';
        html += '<div>';
        html += '<div class="cp">' + cpStr(cp) + '</div>';
        html += '<div class="name">' + name + '</div>';
        html += '<div class="meta">' + block + ' &middot; ' + cat + '</div>';
        html += '</div>';
        html += '</div>';
      });
      if (matches.length > 40) {
        html += '<div class="empty">' + (matches.length - 40) + ' more — refine query</div>';
      }
      results.innerHTML = html;
    }

    function search(val) {
      if (!val.trim()) { results.innerHTML = ''; return; }
      // If single character, look it up by codepoint
      var cps = Array.from(val);
      if (cps.length === 1) {
        var cp = val.codePointAt(0);
        // check dataset first
        var found = DATA.filter(function (r) { return r[0] === cp; });
        if (found.length) { render(found); return; }
        // fallback: show basic info even if not in dataset
        results.innerHTML = '<div class="result-item"><div class="glyph">' + val + '</div><div><div class="cp">' + cpStr(cp) + '</div><div class="name">(not in curated dataset)</div><div class="meta">codepoint ' + cp + '</div></div></div>';
        return;
      }
      // Name/keyword search
      var term = val.trim().toUpperCase();
      var matches = DATA.filter(function (r) {
        return r[1].indexOf(term) !== -1 || r[2].toUpperCase().indexOf(term) !== -1;
      });
      render(matches);
    }

    q.addEventListener('input', function () { search(q.value); });
  })();
