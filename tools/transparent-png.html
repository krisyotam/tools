<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>transparent png — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool-specific */
  .drop-zone { border:1px dashed hsl(var(--border)); border-radius:4px; padding:32px; text-align:center; cursor:pointer; transition:border-color 150ms ease, background 150ms ease; margin-bottom:20px; }
  .drop-zone:hover, .drop-zone.drag-over { border-color:hsl(var(--fg-dim)); background:hsl(var(--accent)); }
  .drop-zone input[type=file] { display:none; }
  .drop-label { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); }
  .drop-label span { color:hsl(var(--fg-dim)); text-decoration:underline; text-underline-offset:2px; cursor:pointer; }
  .lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  .controls { display:grid; grid-template-columns:auto 1fr; gap:16px 20px; align-items:center; margin-bottom:20px; }
  .controls label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); white-space:nowrap; }
  input[type=color] { width:40px; height:32px; appearance:none; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; background:hsl(var(--accent)); cursor:pointer; }
  .tol-row { display:flex; align-items:center; gap:12px; }
  .tol-row input[type=range] { flex:1; accent-color:hsl(var(--fg-dim)); }
  .tol-val { font-family:var(--mono); font-size:12px; color:hsl(var(--fg-dim)); min-width:24px; }
  .previews { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .preview-col { display:flex; flex-direction:column; gap:6px; }
  .preview-lbl { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); }
  .preview-img { max-width:100%; border:1px solid hsl(var(--border)); border-radius:4px; display:block; background-image:repeating-conic-gradient(hsl(var(--muted)) 0% 25%, hsl(var(--bg)) 0% 50%); background-size:16px 16px; }
  .result { display:none; }
  .result.visible { display:block; }
  .dl-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:6px 12px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .dl-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  @media (max-width:560px) { .previews { grid-template-columns:1fr; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>transparent png</h1>
      <p>key out a background color</p>
    </div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" aria-label="Choose image file">
      <div class="drop-label">drop an image here or <span id="browse-lbl">browse</span></div>
    </div>

    <div class="controls">
      <label for="color-pick">target color</label>
      <input type="color" id="color-pick" value="#ffffff" aria-label="Target background color to remove">
      <label for="tolerance">tolerance</label>
      <div class="tol-row">
        <input type="range" id="tolerance" min="0" max="50" value="15" aria-label="Color match tolerance">
        <span class="tol-val" id="tol-val">15</span>
      </div>
    </div>

    <div class="result" id="result">
      <div class="previews">
        <div class="preview-col">
          <div class="preview-lbl">before</div>
          <img class="preview-img" id="prev-before" alt="Original image">
        </div>
        <div class="preview-col">
          <div class="preview-lbl">after</div>
          <img class="preview-img" id="prev-after" alt="Image with background removed">
        </div>
      </div>
      <button class="dl-btn" id="dl-btn">download png</button>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>transparent png</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var dropZone = document.getElementById('drop-zone');
    var fileInput = document.getElementById('file-input');
    var browseLbl = document.getElementById('browse-lbl');
    var colorPick = document.getElementById('color-pick');
    var tolSlider = document.getElementById('tolerance');
    var tolVal = document.getElementById('tol-val');
    var result = document.getElementById('result');
    var prevBefore = document.getElementById('prev-before');
    var prevAfter = document.getElementById('prev-after');
    var dlBtn = document.getElementById('dl-btn');

    var currentImg = null;
    var currentFile = null;

    function hexToRgb(hex) {
      var r = parseInt(hex.slice(1,3),16);
      var g = parseInt(hex.slice(3,5),16);
      var b = parseInt(hex.slice(5,7),16);
      return [r, g, b];
    }

    tolSlider.addEventListener('input', function () {
      tolVal.textContent = tolSlider.value;
      if (currentImg) process();
    });
    colorPick.addEventListener('input', function () { if (currentImg) process(); });

    browseLbl.addEventListener('click', function () { fileInput.click(); });
    dropZone.addEventListener('click', function (e) { if (e.target !== browseLbl) fileInput.click(); });
    dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      var f = e.dataTransfer.files[0]; if (f) loadFile(f);
    });
    fileInput.addEventListener('change', function () { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

    function loadFile(file) {
      currentFile = file;
      var url = URL.createObjectURL(file);
      prevBefore.src = url;
      var img = new Image();
      img.onload = function () {
        currentImg = img;
        process();
      };
      img.src = url;
    }

    function process() {
      var target = hexToRgb(colorPick.value);
      var tol = parseInt(tolSlider.value);
      var w = currentImg.naturalWidth;
      var h = currentImg.naturalHeight;
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(currentImg, 0, 0);
      var imgData = ctx.getImageData(0, 0, w, h);
      var d = imgData.data;
      for (var i = 0; i < d.length; i += 4) {
        var dr = Math.abs(d[i]   - target[0]);
        var dg = Math.abs(d[i+1] - target[1]);
        var db = Math.abs(d[i+2] - target[2]);
        if (dr <= tol && dg <= tol && db <= tol) {
          d[i+3] = 0;
        }
      }
      ctx.putImageData(imgData, 0, 0);
      canvas.toBlob(function (blob) {
        var url = URL.createObjectURL(blob);
        prevAfter.src = url;
        dlBtn.onclick = function () {
          var a = document.createElement('a');
          a.download = (currentFile ? currentFile.name.replace(/\.[^.]+$/, '') : 'image') + '-transparent.png';
          a.href = url;
          a.click();
        };
        result.classList.add('visible');
      }, 'image/png');
    }
  })();
</script>
</body>
</html>
