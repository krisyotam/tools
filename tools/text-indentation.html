<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>text indentation — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:18px 0 6px; }
  textarea { width:100%; min-height:160px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:13px; line-height:1.6; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  textarea::placeholder { color:hsl(var(--muted-fg)); }

  .modes { display:flex; gap:0; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; }
  .mode-btn { appearance:none; background:transparent; border:none; padding:6px 14px; font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .mode-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .controls { display:flex; align-items:center; gap:20px; margin:16px 0; flex-wrap:wrap; }
  .ctrl-group { display:flex; align-items:center; gap:8px; }
  .ctrl-group span { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); letter-spacing:0.06em; }
  input[type="number"] { width:52px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:3px; padding:5px 8px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  input[type="number"]:focus { border-color:hsl(var(--fg-dim)); }

  .checks { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .check-row { display:flex; align-items:center; gap:8px; cursor:pointer; }
  .check-row input[type="checkbox"] { width:16px; height:16px; accent-color:hsl(var(--fg-dim)); cursor:pointer; }
  .check-row span { font-family:var(--mono); font-size:12px; color:hsl(var(--fg-dim)); }

  .btn-row { display:flex; gap:8px; margin-top:8px; }
  .copy { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:5px 10px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .copy:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .info { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin-top:6px; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>text indentation</h1>
      <p>convert between spaces and tabs</p>
    </div>

    <label class="lbl">conversion</label>
    <div class="modes" role="group" aria-label="Conversion direction">
      <button class="mode-btn" data-mode="tabs-to-spaces" aria-pressed="true">tabs → spaces</button>
      <button class="mode-btn" data-mode="spaces-to-tabs" aria-pressed="false">spaces → tabs</button>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <span>indent size</span>
        <input type="number" id="size" value="2" min="1" max="8" aria-label="Indent size">
      </div>
    </div>

    <div class="checks">
      <label class="check-row">
        <input type="checkbox" id="trim-trailing">
        <span>trim trailing whitespace</span>
      </label>
      <label class="check-row">
        <input type="checkbox" id="normalize-lf">
        <span>normalize line endings to LF</span>
      </label>
    </div>

    <label class="lbl" for="inp">input</label>
    <textarea id="inp" placeholder="paste your indented code here…" autofocus></textarea>
    <div class="info" id="detect-info"></div>

    <label class="lbl" for="out">output</label>
    <textarea id="out" readonly></textarea>
    <div class="btn-row">
      <button class="copy" id="copy-btn">copy</button>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>text indentation</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var inEl = document.getElementById('inp');
    var outEl = document.getElementById('out');
    var sizeEl = document.getElementById('size');
    var trimEl = document.getElementById('trim-trailing');
    var lfEl = document.getElementById('normalize-lf');
    var infoEl = document.getElementById('detect-info');
    var copyBtn = document.getElementById('copy-btn');
    var mode = 'tabs-to-spaces';

    function detectIndent(text) {
      var lines = text.split('\n');
      var tabCount = 0, spaceCount = 0, spaceSizes = {};
      for (var i = 0; i < lines.length; i++) {
        var m = lines[i].match(/^(\t+)/);
        if (m) { tabCount++; continue; }
        var sm = lines[i].match(/^( +)/);
        if (sm) {
          spaceCount++;
          var n = sm[1].length;
          spaceSizes[n] = (spaceSizes[n] || 0) + 1;
        }
      }
      if (tabCount > spaceCount) return {type:'tabs', size:null};
      if (spaceCount > 0) {
        var commonSize = 2;
        var max = 0;
        [2,3,4,6,8].forEach(function(s){
          var c = 0;
          for (var k in spaceSizes) { if (parseInt(k) % s === 0) c += spaceSizes[k]; }
          if (c > max) { max = c; commonSize = s; }
        });
        return {type:'spaces', size:commonSize};
      }
      return {type:'unknown', size:null};
    }

    function run() {
      var text = inEl.value;
      var size = Math.max(1, Math.min(8, parseInt(sizeEl.value) || 2));
      var detected = detectIndent(text);

      if (detected.type === 'tabs') {
        infoEl.textContent = 'detected: tabs';
      } else if (detected.type === 'spaces') {
        infoEl.textContent = 'detected: ' + detected.size + '-space indent';
      } else {
        infoEl.textContent = '';
      }

      var lines = text.split('\n');
      var result = lines.map(function(line) {
        var converted = line;
        if (mode === 'tabs-to-spaces') {
          converted = line.replace(/^\t+/, function(m) {
            return m.split('').map(function(){ return new Array(size+1).join(' '); }).join('');
          });
        } else {
          // spaces to tabs — use detected size or user size
          var iSize = detected.size || size;
          var re = new RegExp('^( {' + iSize + '})+');
          converted = line.replace(re, function(m) {
            return new Array(Math.floor(m.length / iSize) + 1).join('\t');
          });
        }
        if (trimEl.checked) converted = converted.replace(/[ \t]+$/, '');
        return converted;
      });

      var out = result.join('\n');
      if (lfEl.checked) out = out.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      outEl.value = out;
    }

    inEl.addEventListener('input', run);
    sizeEl.addEventListener('input', run);
    trimEl.addEventListener('change', run);
    lfEl.addEventListener('change', run);

    document.querySelectorAll('.mode-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(function(b){ b.setAttribute('aria-pressed', b===btn ? 'true' : 'false'); });
        run();
      });
    });

    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(outEl.value).then(function() {
        var o = copyBtn.textContent;
        copyBtn.textContent = 'copied';
        setTimeout(function(){ copyBtn.textContent = o; }, 900);
      });
    });
  })();
</script>
</body>
</html>
