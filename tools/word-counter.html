<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>word counter — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%;
    --muted:0 0% 92%; --muted-fg:0 0% 50%;
    --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%;
    --serif:'Lora',ui-serif,Georgia,serif;
    --sans:'Inter',ui-sans-serif,system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  html.dark {
    --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%;
    --muted:0 0% 12%; --muted-fg:0 0% 60%;
    --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%;
  }
  html.dark { color-scheme: dark; }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .page { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
  .grow { flex-grow: 1; }

  .shell {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 32px 56px;
  }

  /* ── nav: back + toggle ──────────────────────────────────────── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }
  .back {
    font-family: var(--mono);
    font-size: 12px;
    color: hsl(var(--muted-fg));
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 120ms ease;
  }
  .back:hover { color: hsl(var(--fg)); }
  .back svg { width: 12px; height: 12px; }

  .toggle {
    appearance: none;
    background: transparent;
    border: 1px solid hsl(var(--border));
    color: hsl(var(--fg-dim));
    width: 32px; height: 32px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .toggle:hover { background: hsl(var(--accent)); color: hsl(var(--fg)); border-color: hsl(var(--rule)); }
  .toggle svg { width: 16px; height: 16px; }
  .toggle .icon-sun { display: none; }
  .toggle .icon-moon { display: block; }
  html.dark .toggle .icon-sun { display: block; }
  html.dark .toggle .icon-moon { display: none; }

  /* ── page heading ────────────────────────────────────────────── */
  .head { margin-bottom: 32px; }
  .head h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.01em;
    line-height: 1.15;
    margin-bottom: 4px;
  }
  .head p {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: hsl(var(--muted-fg));
  }

  /* ── tool content ────────────────────────────────────────────── */
  textarea {
    width: 100%;
    min-height: 320px;
    appearance: none;
    background: hsl(var(--accent));
    border: 1px solid hsl(var(--border));
    border-radius: 4px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    color: hsl(var(--fg));
    outline: none;
    resize: vertical;
    transition: border-color 150ms ease;
  }
  textarea:focus { border-color: hsl(var(--fg-dim)); }
  textarea::placeholder { color: hsl(var(--muted-fg)); }

  .stats {
    margin-top: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid hsl(var(--rule));
    border-bottom: 1px solid hsl(var(--rule));
  }
  .stat {
    padding: 16px 4px;
    text-align: left;
    border-right: 1px solid hsl(var(--rule));
  }
  .stat:last-child { border-right: none; }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    color: hsl(var(--fg));
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: hsl(var(--muted-fg));
  }

  /* ── footer ──────────────────────────────────────────────────── */
  footer {
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 32px 28px;
  }
  .foot-inner {
    padding-top: 18px;
    border-top: 1px solid hsl(var(--rule));
    font-family: var(--mono);
    font-size: 11px;
    color: hsl(var(--muted-fg));
    display: flex;
    justify-content: space-between;
  }
  footer a { color: inherit; text-decoration: underline; text-underline-offset: 2px; text-decoration-color: hsl(var(--border)); }
  footer a:hover { text-decoration-color: hsl(var(--muted-fg)); }

  @media (max-width: 560px) {
    .shell { padding: 22px 22px 40px; }
    footer { padding: 12px 22px 24px; }
    .head h1 { font-size: 24px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat:nth-child(2) { border-right: none; }
    .stat:nth-child(1), .stat:nth-child(2) { border-bottom: 1px solid hsl(var(--rule)); }
    textarea { min-height: 240px; }
  }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        tools
      </a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>

    <div class="head">
      <h1>word counter</h1>
      <p>count words, characters, and lines</p>
    </div>

    <textarea id="text" placeholder="paste or type text here…" autofocus></textarea>

    <div class="stats">
      <div class="stat"><div class="stat-value" id="words">0</div><div class="stat-label">words</div></div>
      <div class="stat"><div class="stat-value" id="chars">0</div><div class="stat-label">chars</div></div>
      <div class="stat"><div class="stat-value" id="chars-no-spaces">0</div><div class="stat-label">no spaces</div></div>
      <div class="stat"><div class="stat-value" id="lines">0</div><div class="stat-label">lines</div></div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>word counter</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  // theme toggle
  (function () {
    var btn = document.querySelector('[data-theme-toggle]');
    function paintLabel() {
      var dark = document.documentElement.classList.contains('dark');
      btn.setAttribute('aria-label', dark ? 'Switch to light' : 'Switch to dark');
    }
    paintLabel();
    btn.addEventListener('click', function () {
      var h = document.documentElement;
      var dark = h.classList.contains('dark');
      h.classList.remove('dark', 'light');
      var next = dark ? 'light' : 'dark';
      h.classList.add(next);
      try { localStorage.setItem('tools-theme', next); } catch (e) {}
      paintLabel();
    });
  })();

  // word counter
  (function () {
    var ta = document.getElementById('text');
    var nWords = document.getElementById('words');
    var nChars = document.getElementById('chars');
    var nNoSp = document.getElementById('chars-no-spaces');
    var nLines = document.getElementById('lines');
    function fmt(n) { return n.toLocaleString('en-US'); }
    function count() {
      var t = ta.value;
      var words = t.trim() ? t.trim().split(/\s+/).length : 0;
      var chars = t.length;
      var noSp = t.replace(/\s/g, '').length;
      var lines = t === '' ? 0 : t.split('\n').length;
      nWords.textContent = fmt(words);
      nChars.textContent = fmt(chars);
      nNoSp.textContent = fmt(noSp);
      nLines.textContent = fmt(lines);
    }
    ta.addEventListener('input', count);
    count();
  })();
</script>
</body>
</html>
