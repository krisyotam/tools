<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>timestamp — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool-specific */
  .modes { display:flex; gap:0; margin-bottom:20px; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; }
  .mode-btn { appearance:none; background:transparent; border:none; padding:6px 14px; font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .mode-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:18px 0 6px; }
  .input-row { display:flex; gap:8px; align-items:stretch; }
  .input-row input { flex:1; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 12px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; min-width:0; }
  .input-row input:focus { border-color:hsl(var(--fg-dim)); }
  .input-row input::placeholder { color:hsl(var(--muted-fg)); }
  .now-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:0 14px; font-family:var(--mono); font-size:11px; border-radius:4px; cursor:pointer; white-space:nowrap; transition:background 120ms ease, color 120ms ease; }
  .now-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  .rows { margin-top:20px; border-top:1px solid hsl(var(--rule)); }
  .row { display:flex; justify-content:space-between; align-items:baseline; padding:11px 0; border-bottom:1px solid hsl(var(--rule)); gap:16px; }
  .row-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); flex-shrink:0; }
  .row-value { font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); text-align:right; word-break:break-all; }
  .err { font-family:var(--mono); font-size:12px; color:hsl(0 55% 55%); margin-top:8px; min-height:18px; }
  @media (max-width:560px) { .row { flex-direction:column; gap:4px; } .row-value { text-align:left; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>timestamp</h1>
      <p>unix ↔ iso, human-readable</p>
    </div>

    <div class="modes" role="tablist">
      <button class="mode-btn" data-mode="unix" aria-pressed="true">unix → date</button>
      <button class="mode-btn" data-mode="date" aria-pressed="false">date → unix</button>
    </div>

    <div id="unix-mode">
      <label class="lbl" for="ts-input">unix timestamp (seconds or ms)</label>
      <div class="input-row">
        <input id="ts-input" type="text" placeholder="e.g. 1715000000" inputmode="numeric" autofocus>
        <button class="now-btn" id="now-btn" aria-label="Use current timestamp">now</button>
      </div>
      <div class="err" id="ts-err"></div>
      <div class="rows" id="ts-rows">
        <div class="row"><span class="row-label">iso 8601 utc</span><span class="row-value" id="r-utc">—</span></div>
        <div class="row"><span class="row-label">iso 8601 local</span><span class="row-value" id="r-local">—</span></div>
        <div class="row"><span class="row-label">relative</span><span class="row-value" id="r-rel">—</span></div>
        <div class="row"><span class="row-label">weekday + date</span><span class="row-value" id="r-human">—</span></div>
      </div>
    </div>

    <div id="date-mode" style="display:none">
      <label class="lbl" for="date-input">iso date / datetime</label>
      <input id="date-input" type="text" placeholder="e.g. 2024-05-06 or 2024-05-06T12:00:00" style="width:100%;appearance:none;background:hsl(var(--accent));border:1px solid hsl(var(--border));border-radius:4px;padding:10px 12px;font-family:var(--mono);font-size:13px;color:hsl(var(--fg));outline:none;transition:border-color 150ms ease;" onfocus="this.style.borderColor='hsl(var(--fg-dim))'" onblur="this.style.borderColor='hsl(var(--border))'">
      <div class="err" id="date-err"></div>
      <div class="rows" id="date-rows">
        <div class="row"><span class="row-label">unix seconds</span><span class="row-value" id="r-sec">—</span></div>
        <div class="row"><span class="row-label">unix milliseconds</span><span class="row-value" id="r-ms">—</span></div>
      </div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>timestamp</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var mode = 'unix';
    var tsInput = document.getElementById('ts-input');
    var dateInput = document.getElementById('date-input');
    var tsErr = document.getElementById('ts-err');
    var dateErr = document.getElementById('date-err');

    var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2,'0'); }

    function relTime(ms) {
      var diff = Date.now() - ms;
      var abs = Math.abs(diff);
      var future = diff < 0;
      var s = Math.round(abs / 1000);
      var m = Math.round(s / 60);
      var h = Math.round(m / 60);
      var d = Math.round(h / 24);
      var mo = Math.round(d / 30.44);
      var y = Math.round(d / 365.25);
      var str;
      if (s < 45) str = 'just now';
      else if (s < 90) str = '1 minute ago';
      else if (m < 45) str = m + ' minutes ago';
      else if (m < 90) str = '1 hour ago';
      else if (h < 22) str = h + ' hours ago';
      else if (h < 36) str = '1 day ago';
      else if (d < 26) str = d + ' days ago';
      else if (d < 45) str = '1 month ago';
      else if (d < 345) str = mo + ' months ago';
      else if (d < 548) str = '1 year ago';
      else str = y + ' years ago';
      if (future) str = str.replace(' ago','').replace('just now','just now') + (str === 'just now' ? '' : ' from now');
      return str;
    }

    function isoUTC(d) {
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth()+1) + '-' + pad(d.getUTCDate()) +
        'T' + pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds()) + 'Z';
    }

    function isoLocal(d) {
      var off = -d.getTimezoneOffset();
      var sign = off >= 0 ? '+' : '-';
      var oh = Math.floor(Math.abs(off) / 60);
      var om = Math.abs(off) % 60;
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) +
        'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) +
        sign + pad(oh) + ':' + pad(om);
    }

    function runUnix() {
      var raw = tsInput.value.trim();
      if (!raw) { clearUnix(); tsErr.textContent = ''; return; }
      var n = Number(raw);
      if (isNaN(n) || !isFinite(n)) { tsErr.textContent = 'not a number'; clearUnix(); return; }
      // auto-detect ms: 13+ digit numbers are milliseconds
      var ms = (raw.replace('.','').length >= 13) ? n : n * 1000;
      var d = new Date(ms);
      if (isNaN(d.getTime())) { tsErr.textContent = 'invalid timestamp'; clearUnix(); return; }
      tsErr.textContent = '';
      document.getElementById('r-utc').textContent = isoUTC(d);
      document.getElementById('r-local').textContent = isoLocal(d);
      document.getElementById('r-rel').textContent = relTime(ms);
      document.getElementById('r-human').textContent = DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    function clearUnix() {
      ['r-utc','r-local','r-rel','r-human'].forEach(function(id){ document.getElementById(id).textContent = '—'; });
    }

    function runDate() {
      var raw = dateInput.value.trim();
      if (!raw) { clearDate(); dateErr.textContent = ''; return; }
      var d = new Date(raw);
      if (isNaN(d.getTime())) { dateErr.textContent = 'could not parse date'; clearDate(); return; }
      dateErr.textContent = '';
      var ms = d.getTime();
      var sec = Math.floor(ms / 1000);
      document.getElementById('r-sec').textContent = sec.toLocaleString('en-US');
      document.getElementById('r-ms').textContent = ms.toLocaleString('en-US');
    }

    function clearDate() {
      ['r-sec','r-ms'].forEach(function(id){ document.getElementById(id).textContent = '—'; });
    }

    tsInput.addEventListener('input', runUnix);
    dateInput.addEventListener('input', runDate);

    document.getElementById('now-btn').addEventListener('click', function () {
      var sec = Math.floor(Date.now() / 1000);
      tsInput.value = String(sec);
      runUnix();
    });

    document.querySelectorAll('.mode-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
        document.getElementById('unix-mode').style.display = mode === 'unix' ? '' : 'none';
        document.getElementById('date-mode').style.display = mode === 'date' ? '' : 'none';
      });
    });
  })();
</script>
</body>
</html>
