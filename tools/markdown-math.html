<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>markdown math — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- dep: marked 12.0.2 (MIT) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<!-- dep: katex 0.16.11 (MIT) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:760px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  .panes { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
  textarea { width:100%; min-height:420px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:13px; line-height:1.6; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  textarea::placeholder { color:hsl(var(--muted-fg)); }
  .preview-wrap { border:1px solid hsl(var(--border)); border-radius:4px; padding:14px 16px; min-height:420px; background:hsl(var(--accent)); overflow-x:auto; }
  .preview { font-family:var(--serif); font-size:15px; line-height:1.65; color:hsl(var(--fg)); }
  .preview h1,.preview h2,.preview h3,.preview h4 { font-family:var(--serif); font-weight:500; margin:16px 0 8px; letter-spacing:-0.01em; line-height:1.2; }
  .preview h1 { font-size:22px; } .preview h2 { font-size:18px; } .preview h3 { font-size:16px; }
  .preview p { margin-bottom:12px; }
  .preview code { font-family:var(--mono); font-size:12px; background:hsl(var(--muted)); padding:1px 5px; border-radius:3px; }
  .preview pre { background:hsl(var(--muted)); border-radius:4px; padding:12px 14px; overflow-x:auto; margin-bottom:12px; }
  .preview pre code { background:none; padding:0; font-size:12px; }
  .preview blockquote { border-left:2px solid hsl(var(--rule)); padding-left:14px; color:hsl(var(--fg-dim)); margin:0 0 12px; }
  .preview ul,.preview ol { padding-left:20px; margin-bottom:12px; }
  .preview li { margin-bottom:4px; }
  .preview hr { border:none; border-top:1px solid hsl(var(--rule)); margin:20px 0; }
  .preview a { color:hsl(var(--fg-dim)); }
  .preview .katex-display { margin:16px 0; overflow-x:auto; }
  .preview table { width:100%; border-collapse:collapse; margin-bottom:12px; font-size:14px; }
  .preview th,.preview td { border:1px solid hsl(var(--border)); padding:6px 10px; text-align:left; }
  .preview th { font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:hsl(var(--muted-fg)); }

  footer { width:100%; max-width:760px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:640px) {
    .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; }
    .panes { grid-template-columns:1fr; }
    textarea { min-height:240px; }
    .preview-wrap { min-height:180px; }
  }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>markdown math</h1>
      <p>markdown + latex via katex</p>
    </div>

    <div class="panes">
      <div>
        <label class="lbl" for="src">input</label>
        <textarea id="src" placeholder="# Hello&#10;&#10;Inline math: $e^{i\pi}+1=0$&#10;&#10;Block math:&#10;&#10;$$\int_0^\infty e^{-x^2}\,dx = \frac{\sqrt{\pi}}{2}$$" autofocus spellcheck="false"></textarea>
      </div>
      <div>
        <label class="lbl">preview</label>
        <div class="preview-wrap"><div class="preview" id="preview"></div></div>
      </div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>markdown math</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var src = document.getElementById('src');
    var preview = document.getElementById('preview');

    function renderMath(text) {
      // extract $$ blocks, render with katex display mode
      var maths = [];
      var idx = 0;
      // block math $$...$$
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, function (_, expr) {
        var key = '\x00MATH_BLOCK_' + idx + '\x00';
        try {
          maths[idx] = katex.renderToString(expr.trim(), {displayMode: true, throwOnError: false});
        } catch (e) {
          maths[idx] = '<span style="color:hsl(0 60% 50%)">' + expr + '</span>';
        }
        idx++;
        return key;
      });
      // inline math $...$
      text = text.replace(/\$([^$\n]+?)\$/g, function (_, expr) {
        var key = '\x00MATH_INLINE_' + idx + '\x00';
        try {
          maths[idx] = katex.renderToString(expr.trim(), {displayMode: false, throwOnError: false});
        } catch (e) {
          maths[idx] = '<span style="color:hsl(0 60% 50%)">' + expr + '</span>';
        }
        idx++;
        return key;
      });
      // render markdown
      var html = marked.parse(text);
      // restore math
      html = html.replace(/\x00MATH_BLOCK_(\d+)\x00/g, function (_, i) { return maths[parseInt(i)]; });
      html = html.replace(/\x00MATH_INLINE_(\d+)\x00/g, function (_, i) { return maths[parseInt(i)]; });
      return html;
    }

    function render() {
      try {
        preview.innerHTML = renderMath(src.value);
      } catch (e) {
        preview.textContent = 'render error: ' + e.message;
      }
    }

    src.addEventListener('input', render);
    render();
  })();
</script>
</body>
</html>
