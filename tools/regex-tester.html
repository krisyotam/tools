<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>regex tester — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  .pattern-row { display:flex; gap:8px; margin-bottom:16px; align-items:stretch; }
  .pattern-wrap { flex:1; position:relative; display:flex; align-items:center; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; transition:border-color 150ms ease; }
  .pattern-wrap.error { border-color:hsl(0 60% 60%); }
  .pattern-slash { font-family:var(--mono); font-size:14px; color:hsl(var(--muted-fg)); padding:0 6px; user-select:none; }
  .pattern-wrap input { flex:1; appearance:none; background:transparent; border:none; padding:10px 0; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; }
  .pattern-wrap input::placeholder { color:hsl(var(--muted-fg)); }
  .pattern-wrap:focus-within { border-color:hsl(var(--fg-dim)); }
  .flags-wrap { background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; display:flex; align-items:center; transition:border-color 150ms ease; }
  .flags-wrap input { width:68px; appearance:none; background:transparent; border:none; padding:10px 10px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; }
  .flags-wrap input::placeholder { color:hsl(var(--muted-fg)); }
  .flags-wrap:focus-within { border-color:hsl(var(--fg-dim)); }
  textarea { width:100%; min-height:140px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:13px; line-height:1.6; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  textarea::placeholder { color:hsl(var(--muted-fg)); }
  .status { margin-top:10px; font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); }
  .status.ok { color:hsl(var(--fg-dim)); }
  .match-list { margin-top:20px; }
  .match-item { padding:12px 0; border-bottom:1px solid hsl(var(--rule)); }
  .match-item:first-child { border-top:1px solid hsl(var(--rule)); }
  .match-head { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:6px; }
  .match-full { font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:3px; padding:4px 8px; word-break:break-all; }
  .group-list { margin-top:8px; display:flex; flex-direction:column; gap:4px; }
  .group-row { display:flex; gap:8px; align-items:baseline; font-family:var(--mono); font-size:12px; }
  .group-idx { color:hsl(var(--muted-fg)); flex-shrink:0; min-width:24px; }
  .group-val { color:hsl(var(--fg)); word-break:break-all; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>regex tester</h1>
      <p>live match preview with groups</p>
    </div>

    <label class="lbl">pattern</label>
    <div class="pattern-row">
      <div class="pattern-wrap" id="pattern-wrap">
        <span class="pattern-slash">/</span>
        <input type="text" id="pattern" placeholder="pattern" autofocus autocomplete="off" spellcheck="false">
        <span class="pattern-slash">/</span>
      </div>
      <div class="flags-wrap">
        <input type="text" id="flags" placeholder="gimsuy" maxlength="6" autocomplete="off" spellcheck="false" aria-label="Flags">
      </div>
    </div>

    <label class="lbl" for="test-str">test string</label>
    <textarea id="test-str" placeholder="paste test string here…"></textarea>

    <div class="status" id="status"></div>
    <div class="match-list" id="match-list"></div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>regex tester</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var patEl = document.getElementById('pattern');
    var flagsEl = document.getElementById('flags');
    var testEl = document.getElementById('test-str');
    var statusEl = document.getElementById('status');
    var listEl = document.getElementById('match-list');
    var wrapEl = document.getElementById('pattern-wrap');

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function run() {
      var pat = patEl.value;
      var flags = flagsEl.value.replace(/[^gimsuy]/g,'');
      var str = testEl.value;
      listEl.innerHTML = '';
      statusEl.textContent = '';
      statusEl.className = 'status';
      wrapEl.classList.remove('error');

      if (!pat) return;

      var re;
      try {
        // Ensure global flag for iterating all matches
        var f = flags.includes('g') ? flags : flags + 'g';
        re = new RegExp(pat, f);
      } catch(e) {
        wrapEl.classList.add('error');
        statusEl.textContent = 'error: ' + e.message;
        return;
      }

      if (!str) { statusEl.textContent = 'no test string'; return; }

      var matches = [];
      var m;
      var limit = 200;
      while ((m = re.exec(str)) !== null && matches.length < limit) {
        matches.push(m);
        if (!re.global || m[0].length === 0) { re.lastIndex++; }
      }

      if (matches.length === 0) {
        statusEl.textContent = 'no matches';
        return;
      }

      var plural = matches.length === 1 ? 'match' : 'matches';
      statusEl.textContent = matches.length + ' ' + plural;
      statusEl.className = 'status ok';

      matches.forEach(function(m, idx) {
        var item = document.createElement('div');
        item.className = 'match-item';
        var head = document.createElement('div');
        head.className = 'match-head';
        head.textContent = 'match ' + (idx+1) + ' · index ' + m.index;
        var full = document.createElement('div');
        full.className = 'match-full';
        full.textContent = m[0];
        item.appendChild(head);
        item.appendChild(full);
        if (m.length > 1) {
          var gl = document.createElement('div');
          gl.className = 'group-list';
          for (var g=1; g<m.length; g++) {
            var gr = document.createElement('div');
            gr.className = 'group-row';
            var gi = document.createElement('span');
            gi.className = 'group-idx';
            gi.textContent = '$' + g;
            var gv = document.createElement('span');
            gv.className = 'group-val';
            gv.textContent = m[g] === undefined ? '(undefined)' : m[g];
            gr.appendChild(gi);
            gr.appendChild(gv);
            gl.appendChild(gr);
          }
          item.appendChild(gl);
        }
        listEl.appendChild(item);
      });
    }

    patEl.addEventListener('input', run);
    flagsEl.addEventListener('input', run);
    testEl.addEventListener('input', run);
  })();
</script>
</body>
</html>
