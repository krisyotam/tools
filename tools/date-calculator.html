<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>date calculator — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool-specific */
  .modes { display:flex; gap:0; margin-bottom:24px; border:1px solid hsl(var(--border)); border-radius:4px; padding:2px; width:fit-content; }
  .mode-btn { appearance:none; background:transparent; border:none; padding:6px 14px; font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); cursor:pointer; border-radius:3px; transition:background 120ms ease, color 120ms ease; }
  .mode-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  input[type="date"], input[type="text"] { width:100%; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 12px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  input[type="date"]:focus, input[type="text"]:focus { border-color:hsl(var(--fg-dim)); }
  input[type="date"]::placeholder, input[type="text"]::placeholder { color:hsl(var(--muted-fg)); }
  .field { margin-bottom:14px; }
  .err { font-family:var(--mono); font-size:12px; color:hsl(0 55% 55%); margin-top:6px; min-height:18px; }
  .stats { margin-top:24px; display:grid; gap:0; border-top:1px solid hsl(var(--rule)); border-bottom:1px solid hsl(var(--rule)); }
  .stats.cols-4 { grid-template-columns: repeat(4,1fr); }
  .stats.cols-1 { grid-template-columns: 1fr; }
  .stat { padding:16px 4px; text-align:left; border-right:1px solid hsl(var(--rule)); }
  .stat:last-child { border-right:none; }
  .stat-value { font-family:var(--mono); font-size:22px; color:hsl(var(--fg)); font-weight:500; margin-bottom:4px; letter-spacing:-0.01em; }
  .stat-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); }
  .result-date { font-family:var(--mono); font-size:18px; color:hsl(var(--fg)); padding:16px 4px; }
  @media (max-width:560px) { .stats.cols-4 { grid-template-columns:repeat(2,1fr); } .stat:nth-child(2){ border-right:none; } .stat:nth-child(1),.stat:nth-child(2){ border-bottom:1px solid hsl(var(--rule)); } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>date calculator</h1>
      <p>diff or add to dates</p>
    </div>

    <div class="modes" role="tablist">
      <button class="mode-btn" data-mode="diff" aria-pressed="true">diff</button>
      <button class="mode-btn" data-mode="add" aria-pressed="false">add / subtract</button>
    </div>

    <div id="diff-mode">
      <div class="field">
        <label class="lbl" for="d1">start date</label>
        <input type="date" id="d1">
      </div>
      <div class="field">
        <label class="lbl" for="d2">end date</label>
        <input type="date" id="d2">
      </div>
      <div class="err" id="diff-err"></div>
      <div class="stats cols-4" id="diff-stats">
        <div class="stat"><div class="stat-value" id="s-days">—</div><div class="stat-label">days</div></div>
        <div class="stat"><div class="stat-value" id="s-weeks">—</div><div class="stat-label">weeks</div></div>
        <div class="stat"><div class="stat-value" id="s-months">—</div><div class="stat-label">months</div></div>
        <div class="stat"><div class="stat-value" id="s-years">—</div><div class="stat-label">years</div></div>
      </div>
    </div>

    <div id="add-mode" style="display:none">
      <div class="field">
        <label class="lbl" for="add-date">start date</label>
        <input type="date" id="add-date">
      </div>
      <div class="field">
        <label class="lbl" for="add-dur">duration (e.g. +30 days, -2 weeks, +1 year)</label>
        <input type="text" id="add-dur" placeholder="+30 days">
      </div>
      <div class="err" id="add-err"></div>
      <div class="stats cols-1" id="add-stats" style="display:none">
        <div class="stat" style="border-right:none">
          <div class="stat-value" id="add-result">—</div>
          <div class="stat-label">result date</div>
        </div>
      </div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>date calculator</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    // Set defaults to today and 30 days later
    var today = new Date();
    function dateStr(d) {
      var p = function(n){ return String(n).padStart(2,'0'); };
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
    }
    var later = new Date(today); later.setDate(later.getDate() + 30);
    document.getElementById('d1').value = dateStr(today);
    document.getElementById('d2').value = dateStr(later);
    document.getElementById('add-date').value = dateStr(today);

    function parseLocalDate(s) {
      var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      return new Date(+m[1], +m[2]-1, +m[3]);
    }

    function runDiff() {
      var d1 = parseLocalDate(document.getElementById('d1').value);
      var d2 = parseLocalDate(document.getElementById('d2').value);
      var err = document.getElementById('diff-err');
      if (!d1 || !d2) { err.textContent = ''; return; }
      err.textContent = '';
      var msPerDay = 86400000;
      var diffMs = d2 - d1;
      var days = Math.round(diffMs / msPerDay);
      var absDays = Math.abs(days);
      document.getElementById('s-days').textContent = days.toLocaleString('en-US');
      document.getElementById('s-weeks').textContent = (days / 7).toFixed(1);
      // months: difference in calendar months
      var mo = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
      document.getElementById('s-months').textContent = mo;
      var yr = d2.getFullYear() - d1.getFullYear();
      document.getElementById('s-years').textContent = yr.toFixed(2);
    }

    function parseDuration(s) {
      // e.g. "+30 days", "-2 weeks", "+1 year", "3 months"
      var m = s.trim().match(/^([+-]?\d+)\s*(day|days|week|weeks|month|months|year|years)$/i);
      if (!m) return null;
      return { n: parseInt(m[1], 10), unit: m[2].toLowerCase().replace(/s$/, '') };
    }

    function runAdd() {
      var d = parseLocalDate(document.getElementById('add-date').value);
      var durStr = document.getElementById('add-dur').value;
      var err = document.getElementById('add-err');
      var statsEl = document.getElementById('add-stats');
      if (!d || !durStr.trim()) { err.textContent = ''; statsEl.style.display = 'none'; return; }
      var dur = parseDuration(durStr);
      if (!dur) { err.textContent = 'format: +30 days, -2 weeks, +1 year, +3 months'; statsEl.style.display = 'none'; return; }
      err.textContent = '';
      var result = new Date(d);
      if (dur.unit === 'day') result.setDate(result.getDate() + dur.n);
      else if (dur.unit === 'week') result.setDate(result.getDate() + dur.n * 7);
      else if (dur.unit === 'month') result.setMonth(result.getMonth() + dur.n);
      else if (dur.unit === 'year') result.setFullYear(result.getFullYear() + dur.n);
      statsEl.style.display = '';
      var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('add-result').textContent = DAYS[result.getDay()] + ', ' + MONTHS[result.getMonth()] + ' ' + result.getDate() + ', ' + result.getFullYear();
    }

    document.getElementById('d1').addEventListener('input', runDiff);
    document.getElementById('d2').addEventListener('input', runDiff);
    document.getElementById('add-date').addEventListener('input', runAdd);
    document.getElementById('add-dur').addEventListener('input', runAdd);

    document.querySelectorAll('.mode-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.mode-btn').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
        document.getElementById('diff-mode').style.display = btn.dataset.mode === 'diff' ? '' : 'none';
        document.getElementById('add-mode').style.display = btn.dataset.mode === 'add' ? '' : 'none';
      });
    });

    runDiff();
  })();
</script>
</body>
</html>
