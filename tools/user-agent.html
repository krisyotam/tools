<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>user agent — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  .input-row { display:flex; gap:8px; align-items:flex-start; }
  .ua-input { flex:1; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:12px; line-height:1.5; color:hsl(var(--fg)); outline:none; resize:vertical; min-height:64px; transition:border-color 150ms ease; }
  .ua-input:focus { border-color:hsl(var(--fg-dim)); }
  .btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:8px 12px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; white-space:nowrap; flex-shrink:0; }
  .btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .sep { margin:20px 0; border:none; border-top:1px solid hsl(var(--rule)); }

  .section-lbl { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:20px 0 10px; }

  dl.parsed { display:grid; grid-template-columns: max-content 1fr; gap:6px 20px; }
  dl.parsed dt { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); align-self:start; padding-top:1px; }
  dl.parsed dd { font-family:var(--sans); font-size:14px; color:hsl(var(--fg)); }
  dl.parsed dd.unknown { color:hsl(var(--muted-fg)); font-style:italic; }

  .tokens { display:flex; flex-wrap:wrap; gap:6px; }
  .token { font-family:var(--mono); font-size:11px; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:3px; padding:3px 8px; color:hsl(var(--fg-dim)); }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } dl.parsed { grid-template-columns:1fr; } dl.parsed dt { margin-top:8px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>user agent</h1>
      <p>parse browser user-agent strings</p>
    </div>

    <label class="lbl" for="ua-in">user-agent string</label>
    <div class="input-row">
      <textarea class="ua-input" id="ua-in" spellcheck="false"></textarea>
      <button class="btn" id="use-mine">use mine</button>
    </div>

    <hr class="sep">

    <p class="section-lbl">parsed fields</p>
    <dl class="parsed" id="parsed-dl"></dl>

    <p class="section-lbl" style="margin-top:24px;">raw tokens</p>
    <div class="tokens" id="tokens-wrap"></div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>user agent</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var inEl     = document.getElementById('ua-in');
    var dl       = document.getElementById('parsed-dl');
    var tokWrap  = document.getElementById('tokens-wrap');
    var mineBtn  = document.getElementById('use-mine');

    function parseUA(ua) {
      var r = { browser:'unknown', version:'unknown', engine:'unknown', os:'unknown', device:'desktop', arch:'unknown' };
      if (!ua) return r;

      // OS
      if (/Windows NT 10/.test(ua))       r.os = 'Windows 10/11';
      else if (/Windows NT 6\.3/.test(ua)) r.os = 'Windows 8.1';
      else if (/Windows NT 6\.1/.test(ua)) r.os = 'Windows 7';
      else if (/Windows/.test(ua))         r.os = 'Windows';
      else if (/iPhone OS ([\d_]+)/.test(ua)) r.os = 'iOS ' + RegExp.$1.replace(/_/g,'.');
      else if (/iPad.*OS ([\d_]+)/.test(ua))  r.os = 'iPadOS ' + RegExp.$1.replace(/_/g,'.');
      else if (/Android ([\d.]+)/.test(ua))   r.os = 'Android ' + RegExp.$1;
      else if (/Mac OS X ([\d_]+)/.test(ua))  r.os = 'macOS ' + RegExp.$1.replace(/_/g,'.');
      else if (/Linux/.test(ua))           r.os = 'Linux';
      else if (/CrOS/.test(ua))            r.os = 'ChromeOS';

      // device type
      if (/Mobi|Android.*Mobile|iPhone|iPod/.test(ua)) r.device = 'mobile';
      else if (/iPad|tablet|Tablet/.test(ua))           r.device = 'tablet';
      else                                               r.device = 'desktop';

      // architecture
      if (/arm64|aarch64|ARM64/.test(ua))  r.arch = 'arm64';
      else if (/armv7|arm/.test(ua))       r.arch = 'arm';
      else if (/x86_64|Win64|WOW64/.test(ua)) r.arch = 'x86-64';
      else if (/i686|i386/.test(ua))       r.arch = 'x86';

      // engine + browser (order matters: Edge before Chrome, Chromium before Safari)
      if (/Edg\/([\d.]+)/.test(ua)) {
        r.browser = 'Edge'; r.version = RegExp.$1; r.engine = 'Blink';
      } else if (/OPR\/([\d.]+)/.test(ua)) {
        r.browser = 'Opera'; r.version = RegExp.$1; r.engine = 'Blink';
      } else if (/SamsungBrowser\/([\d.]+)/.test(ua)) {
        r.browser = 'Samsung Internet'; r.version = RegExp.$1; r.engine = 'Blink';
      } else if (/Chrome\/([\d.]+)/.test(ua)) {
        r.browser = 'Chrome'; r.version = RegExp.$1; r.engine = 'Blink';
      } else if (/Firefox\/([\d.]+)/.test(ua)) {
        r.browser = 'Firefox'; r.version = RegExp.$1;
        r.engine = /Gecko\/[\d]/.test(ua) ? 'Gecko' : 'unknown';
      } else if (/Version\/([\d.]+).*Safari/.test(ua)) {
        r.browser = 'Safari'; r.version = RegExp.$1; r.engine = 'WebKit';
      } else if (/Safari\//.test(ua)) {
        r.browser = 'Safari'; r.engine = 'WebKit';
      } else if (/MSIE ([\d.]+)/.test(ua) || /Trident.*rv:([\d.]+)/.test(ua)) {
        r.browser = 'Internet Explorer'; r.version = RegExp.$1; r.engine = 'Trident';
      }

      return r;
    }

    function tokenise(ua) {
      // split on spaces outside parentheses groups
      var tokens = [];
      var depth  = 0, cur = '';
      for (var i = 0; i < ua.length; i++) {
        var c = ua[i];
        if (c === '(') { depth++; cur += c; }
        else if (c === ')') { depth--; cur += c; if (depth === 0) { tokens.push(cur.trim()); cur = ''; } }
        else if (c === ' ' && depth === 0) { if (cur.trim()) tokens.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      if (cur.trim()) tokens.push(cur.trim());
      return tokens;
    }

    function render(ua) {
      ua = ua.trim();
      var info = parseUA(ua);
      var fields = [
        ['Browser',       info.browser],
        ['Version',       info.version],
        ['Engine',        info.engine],
        ['OS',            info.os],
        ['Device type',   info.device],
        ['Architecture',  info.arch]
      ];
      dl.innerHTML = fields.map(function (f) {
        var unknown = f[1] === 'unknown';
        return '<dt>' + f[0] + '</dt><dd' + (unknown ? ' class="unknown"' : '') + '>' + (unknown ? 'unknown' : escH(f[1])) + '</dd>';
      }).join('');

      var toks = ua ? tokenise(ua) : [];
      tokWrap.innerHTML = toks.map(function (t) {
        return '<span class="token">' + escH(t) + '</span>';
      }).join('');
    }

    function escH(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    inEl.addEventListener('input', function () { render(inEl.value); });
    mineBtn.addEventListener('click', function () { inEl.value = navigator.userAgent; render(inEl.value); });

    // prefill with current UA
    inEl.value = navigator.userAgent;
    render(inEl.value);
  })();
</script>
</body>
</html>
