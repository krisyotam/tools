<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>csv to table — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  textarea { width:100%; min-height:140px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:13px; line-height:1.6; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  textarea::placeholder { color:hsl(var(--muted-fg)); }

  .info-bar { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin:6px 0 16px; }

  .options { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:20px; align-items:center; }
  .check-row { display:flex; align-items:center; gap:6px; cursor:pointer; }
  .check-row input[type="checkbox"] { width:15px; height:15px; accent-color:hsl(var(--fg-dim)); cursor:pointer; }
  .check-row span { font-family:var(--mono); font-size:12px; color:hsl(var(--fg-dim)); }

  .align-group { display:flex; align-items:center; gap:6px; }
  .align-group span { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); letter-spacing:0.06em; }
  .align-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--muted-fg)); padding:3px 8px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .align-btn[aria-pressed="true"] { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }

  .section { margin-top:20px; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .copy { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:4px 10px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .copy:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .preview-wrap { overflow-x:auto; border:1px solid hsl(var(--border)); border-radius:4px; background:hsl(var(--accent)); }
  .preview-wrap table { border-collapse:collapse; width:100%; font-size:13px; }
  .preview-wrap th { font-family:var(--mono); font-size:12px; font-weight:500; padding:8px 12px; text-align:left; border-bottom:2px solid hsl(var(--rule)); color:hsl(var(--fg)); white-space:nowrap; }
  .preview-wrap td { font-family:var(--mono); font-size:12px; padding:7px 12px; border-bottom:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); white-space:nowrap; }
  .preview-wrap tr:last-child td { border-bottom:none; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>csv to table</h1>
      <p>csv &#x2192; markdown table</p>
    </div>

    <label class="lbl" for="inp">csv input</label>
    <textarea id="inp" placeholder="name,age,city&#10;Alice,30,Paris&#10;Bob,25,Tokyo" autofocus></textarea>
    <div class="info-bar" id="info"></div>

    <div class="options">
      <label class="check-row">
        <input type="checkbox" id="has-header" checked>
        <span>first row is header</span>
      </label>
      <div class="align-group">
        <span>align</span>
        <button class="align-btn" data-align="left" aria-pressed="true">left</button>
        <button class="align-btn" data-align="center" aria-pressed="false">center</button>
        <button class="align-btn" data-align="right" aria-pressed="false">right</button>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <label class="lbl" for="out" style="margin:0">markdown output</label>
        <button class="copy" id="copy-md">copy</button>
      </div>
      <textarea id="out" readonly style="min-height:120px"></textarea>
    </div>

    <div class="section">
      <label class="lbl">html preview</label>
      <div class="preview-wrap" id="preview"><em style="font-size:13px;color:hsl(var(--muted-fg));padding:12px;display:block">paste csv above</em></div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>csv to table</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var inEl = document.getElementById('inp');
    var outEl = document.getElementById('out');
    var infoEl = document.getElementById('info');
    var previewEl = document.getElementById('preview');
    var headerEl = document.getElementById('has-header');
    var copyMd = document.getElementById('copy-md');
    var align = 'left';

    function detectDelimiter(text) {
      var lines = text.split('\n').slice(0,5);
      var counts = {',':0, ';':0, '\t':0};
      lines.forEach(function(l) {
        counts[','] += (l.match(/,/g)||[]).length;
        counts[';'] += (l.match(/;/g)||[]).length;
        counts['\t'] += (l.match(/\t/g)||[]).length;
      });
      if (counts['\t'] >= counts[','] && counts['\t'] >= counts[';']) return '\t';
      if (counts[';'] > counts[',']) return ';';
      return ',';
    }

    function parseCSV(text, delim) {
      var rows = [];
      var row = [];
      var field = '';
      var inQuote = false;
      var i = 0;
      while (i < text.length) {
        var ch = text[i];
        if (inQuote) {
          if (ch === '"') {
            if (text[i+1] === '"') { field += '"'; i += 2; continue; }
            inQuote = false; i++; continue;
          }
          field += ch; i++; continue;
        }
        if (ch === '"') { inQuote = true; i++; continue; }
        if (ch === delim) { row.push(field); field = ''; i++; continue; }
        if (ch === '\r') { i++; continue; }
        if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
        field += ch; i++;
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      // filter empty trailing rows
      while (rows.length && rows[rows.length-1].every(function(c){ return c.trim()===''; })) rows.pop();
      return rows;
    }

    function escMd(s) { return s.replace(/\|/g,'\\|').replace(/\n/g,' '); }

    function alignSep(a) {
      if (a === 'center') return ':---:';
      if (a === 'right') return '---:';
      return ':---';
    }

    function buildMd(rows, hasHeader, al) {
      if (!rows.length) return '';
      var cols = rows.reduce(function(m,r){ return Math.max(m,r.length); }, 0);
      // pad rows
      rows = rows.map(function(r) {
        while (r.length < cols) r.push('');
        return r;
      });

      var colWidths = [];
      for (var c = 0; c < cols; c++) {
        var w = 1;
        rows.forEach(function(r){ w = Math.max(w, escMd(r[c]||'').length); });
        colWidths.push(Math.max(w, 3));
      }

      function padCell(s, w) {
        var es = escMd(s);
        return ' ' + es + new Array(w - es.length + 1).join(' ') + ' ';
      }

      function makeRow(cells) {
        return '|' + cells.map(function(c,i){ return padCell(c, colWidths[i]); }).join('|') + '|';
      }

      var lines = [];
      var dataStart = 0;
      if (hasHeader && rows.length > 0) {
        lines.push(makeRow(rows[0]));
        var sep = '|' + colWidths.map(function(w){ return ' ' + alignSep(al) + new Array(Math.max(0,w-3)+1).join('-') + ' '; }).join('|') + '|';
        lines.push(sep);
        dataStart = 1;
      }
      for (var i = dataStart; i < rows.length; i++) {
        lines.push(makeRow(rows[i]));
      }
      return lines.join('\n');
    }

    function buildPreview(rows, hasHeader) {
      if (!rows.length) return '<em style="font-size:13px;color:hsl(var(--muted-fg));padding:12px;display:block">paste csv above</em>';
      var tbl = '<table>';
      var start = 0;
      if (hasHeader && rows.length > 0) {
        tbl += '<thead><tr>' + rows[0].map(function(c){ return '<th>' + esc(c) + '</th>'; }).join('') + '</tr></thead>';
        start = 1;
      }
      tbl += '<tbody>';
      for (var i = start; i < rows.length; i++) {
        tbl += '<tr>' + rows[i].map(function(c){ return '<td>' + esc(c) + '</td>'; }).join('') + '</tr>';
      }
      tbl += '</tbody></table>';
      return tbl;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function run() {
      var text = inEl.value;
      if (!text.trim()) {
        outEl.value = '';
        infoEl.textContent = '';
        previewEl.innerHTML = '<em style="font-size:13px;color:hsl(var(--muted-fg));padding:12px;display:block">paste csv above</em>';
        return;
      }
      var delim = detectDelimiter(text);
      var rows = parseCSV(text, delim);
      var hasHeader = headerEl.checked;
      var cols = rows.reduce(function(m,r){ return Math.max(m,r.length); },0);
      var delimName = delim === '\t' ? 'tab' : delim === ';' ? 'semicolon' : 'comma';
      infoEl.textContent = rows.length + ' rows, ' + cols + ' cols — detected delimiter: ' + delimName;
      outEl.value = buildMd(rows, hasHeader, align);
      previewEl.innerHTML = buildPreview(rows, hasHeader);
    }

    inEl.addEventListener('input', run);
    headerEl.addEventListener('change', run);

    document.querySelectorAll('.align-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        align = btn.dataset.align;
        document.querySelectorAll('.align-btn').forEach(function(b){ b.setAttribute('aria-pressed', b===btn ? 'true' : 'false'); });
        run();
      });
    });

    copyMd.addEventListener('click', function() {
      if (!outEl.value) return;
      navigator.clipboard.writeText(outEl.value).then(function() {
        var o = copyMd.textContent;
        copyMd.textContent = 'copied';
        setTimeout(function(){ copyMd.textContent = o; }, 900);
      });
    });
  })();
</script>
</body>
</html>
