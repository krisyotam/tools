<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>password generator — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  /* tool */
  .pw-display { width:100%; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:18px 16px; font-family:var(--mono); font-size:15px; line-height:1.5; color:hsl(var(--fg)); word-break:break-all; min-height:64px; margin-bottom:10px; }
  .btn-row { display:flex; gap:8px; margin-bottom:24px; }
  .action-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:6px 14px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .action-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:8px; }
  .section { margin-bottom:20px; }
  .range-wrap { display:flex; align-items:center; gap:12px; }
  input[type="range"] { flex:1; accent-color:hsl(var(--fg-dim)); height:4px; }
  .range-val { font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); min-width:28px; }

  .checkboxes { display:flex; flex-direction:column; gap:8px; }
  .check-row { display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); cursor:pointer; }
  .check-row input[type="checkbox"] { width:16px; height:16px; cursor:pointer; accent-color:hsl(var(--fg-dim)); }

  .stats { margin-top:24px; display:grid; grid-template-columns:repeat(3,1fr); gap:0; border-top:1px solid hsl(var(--rule)); border-bottom:1px solid hsl(var(--rule)); }
  .stat { padding:14px 4px; border-right:1px solid hsl(var(--rule)); }
  .stat:last-child { border-right:none; }
  .stat-value { font-family:var(--mono); font-size:20px; color:hsl(var(--fg)); font-weight:500; margin-bottom:3px; letter-spacing:-0.01em; }
  .stat-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); }

  .err { font-family:var(--mono); font-size:12px; color:hsl(0 60% 55%); margin-top:6px; min-height:18px; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) {
    .shell { padding:22px 22px 40px; }
    footer { padding:12px 22px 24px; }
    .head h1 { font-size:24px; }
    .stats { grid-template-columns:repeat(3,1fr); }
  }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>password generator</h1>
      <p>strong, configurable passwords</p>
    </div>

    <div class="pw-display" id="pw-out" aria-live="polite"></div>
    <div class="btn-row">
      <button class="action-btn" id="regen-btn">regenerate</button>
      <button class="action-btn" id="copy-btn">copy</button>
    </div>
    <div class="err" id="err-msg"></div>

    <div class="section">
      <label class="lbl" for="len-range">length</label>
      <div class="range-wrap">
        <input type="range" id="len-range" min="8" max="128" value="24" aria-label="Password length">
        <span class="range-val" id="len-val">24</span>
      </div>
    </div>

    <div class="section">
      <span class="lbl">character sets</span>
      <div class="checkboxes">
        <label class="check-row"><input type="checkbox" id="cb-upper" checked> uppercase (A–Z)</label>
        <label class="check-row"><input type="checkbox" id="cb-lower" checked> lowercase (a–z)</label>
        <label class="check-row"><input type="checkbox" id="cb-digits" checked> digits (0–9)</label>
        <label class="check-row"><input type="checkbox" id="cb-symbols" checked> symbols (!@#$…)</label>
        <label class="check-row"><input type="checkbox" id="cb-ambig"> exclude ambiguous (0,O,1,l,I)</label>
        <label class="check-row"><input type="checkbox" id="cb-pronounce"> pronounceable mode</label>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-value" id="stat-entropy">—</div><div class="stat-label">entropy (bits)</div></div>
      <div class="stat"><div class="stat-value" id="stat-pool">—</div><div class="stat-label">pool size</div></div>
      <div class="stat"><div class="stat-value" id="stat-crack">—</div><div class="stat-label">crack time</div></div>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>password generator</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    var LOWER = 'abcdefghijklmnopqrstuvwxyz';
    var DIGITS = '0123456789';
    var SYMBOLS = '!@#$%^&*()-_=+[]{}|;:,.<>?';
    var AMBIG = /[0O1lI]/g;

    var CONSONANTS = 'bcdfghjklmnprstvwxyz';
    var VOWELS = 'aeiou';

    var pwOut = document.getElementById('pw-out');
    var errMsg = document.getElementById('err-msg');
    var lenRange = document.getElementById('len-range');
    var lenVal = document.getElementById('len-val');
    var cbUpper = document.getElementById('cb-upper');
    var cbLower = document.getElementById('cb-lower');
    var cbDigits = document.getElementById('cb-digits');
    var cbSymbols = document.getElementById('cb-symbols');
    var cbAmbig = document.getElementById('cb-ambig');
    var cbPronounce = document.getElementById('cb-pronounce');
    var statEntropy = document.getElementById('stat-entropy');
    var statPool = document.getElementById('stat-pool');
    var statCrack = document.getElementById('stat-crack');

    lenRange.addEventListener('input', function(){ lenVal.textContent = lenRange.value; generate(); });
    [cbUpper,cbLower,cbDigits,cbSymbols,cbAmbig,cbPronounce].forEach(function(c){ c.addEventListener('change', generate); });
    document.getElementById('regen-btn').addEventListener('click', generate);
    document.getElementById('copy-btn').addEventListener('click', function(){
      var txt = pwOut.textContent;
      if (!txt || errMsg.textContent) return;
      navigator.clipboard.writeText(txt).then(function(){
        var btn = document.getElementById('copy-btn');
        var o = btn.textContent; btn.textContent = 'copied';
        setTimeout(function(){ btn.textContent = o; }, 900);
      });
    });

    function randInt(max) {
      var arr = new Uint32Array(1);
      do { crypto.getRandomValues(arr); } while (arr[0] >= Math.floor(0xFFFFFFFF / max) * max);
      return arr[0] % max;
    }

    function pronounceable(len) {
      var out = '';
      var useVowel = false;
      for (var i = 0; i < len; i++) {
        if (useVowel) {
          out += VOWELS[randInt(VOWELS.length)];
        } else {
          out += CONSONANTS[randInt(CONSONANTS.length)];
        }
        useVowel = !useVowel;
      }
      return out;
    }

    function crackTime(entropy) {
      // offline fast hash: ~1e10 guesses/sec
      var guesses = Math.pow(2, entropy);
      var secs = guesses / 1e10 / 2; // avg half keyspace
      if (secs < 1) return '<1s';
      if (secs < 60) return Math.round(secs) + 's';
      if (secs < 3600) return Math.round(secs/60) + 'm';
      if (secs < 86400) return Math.round(secs/3600) + 'h';
      if (secs < 86400*365) return Math.round(secs/86400) + 'd';
      if (secs < 86400*365*1e3) return Math.round(secs/(86400*365)) + 'y';
      if (secs < 86400*365*1e6) return (secs/(86400*365*1e3)).toFixed(1) + 'ky';
      if (secs < 86400*365*1e9) return (secs/(86400*365*1e6)).toFixed(1) + 'My';
      return '>>1By';
    }

    function generate() {
      var len = parseInt(lenRange.value, 10);
      var useAmbig = cbAmbig.checked;
      var pronounce = cbPronounce.checked;
      errMsg.textContent = '';

      if (pronounce) {
        var pw = pronounceable(len);
        pwOut.textContent = pw;
        // entropy: rough estimate — alternating from pools
        var poolEst = CONSONANTS.length + VOWELS.length;
        var ent = Math.round(len * Math.log2(poolEst / 2));
        statEntropy.textContent = ent;
        statPool.textContent = poolEst;
        statCrack.textContent = crackTime(ent);
        return;
      }

      var pool = '';
      if (cbUpper.checked) pool += UPPER;
      if (cbLower.checked) pool += LOWER;
      if (cbDigits.checked) pool += DIGITS;
      if (cbSymbols.checked) pool += SYMBOLS;
      if (useAmbig) pool = pool.replace(AMBIG, '');

      if (!pool) {
        pwOut.textContent = '';
        errMsg.textContent = 'select at least one character set';
        statEntropy.textContent = '—';
        statPool.textContent = '—';
        statCrack.textContent = '—';
        return;
      }

      var out = '';
      for (var i = 0; i < len; i++) {
        out += pool[randInt(pool.length)];
      }
      pwOut.textContent = out;

      var entropy = Math.round(len * Math.log2(pool.length));
      statEntropy.textContent = entropy;
      statPool.textContent = pool.length;
      statCrack.textContent = crackTime(entropy);
    }

    generate();
  })();
</script>
</body>
</html>
