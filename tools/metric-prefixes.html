<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>metric prefixes — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  input[type="text"] { width:100%; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:16px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; margin-bottom:24px; }
  input[type="text"]:focus { border-color:hsl(var(--fg-dim)); }
  input[type="text"]::placeholder { color:hsl(var(--muted-fg)); }

  .table { width:100%; border-collapse:collapse; }
  .table th { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); padding:0 0 8px; text-align:left; border-bottom:1px solid hsl(var(--rule)); }
  .table th:last-child { text-align:right; }
  .table td { padding:10px 0; border-bottom:1px solid hsl(var(--border)); vertical-align:middle; }
  .table tr:last-child td { border-bottom:none; }
  .table tr.natural td { background:hsl(var(--accent)); }
  .table tr.natural td:first-child { border-radius:4px 0 0 4px; padding-left:10px; }
  .table tr.natural td:last-child { border-radius:0 4px 4px 0; padding-right:10px; }
  .col-sym { font-family:var(--mono); font-size:15px; color:hsl(var(--fg)); width:52px; }
  .col-name { font-family:var(--serif); font-size:14px; color:hsl(var(--fg-dim)); width:100px; }
  .col-exp { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); width:80px; }
  .col-val { font-family:var(--mono); font-size:14px; color:hsl(var(--fg)); text-align:right; }
  .col-val .unit { color:hsl(var(--muted-fg)); font-size:12px; margin-left:4px; }
  .empty { font-family:var(--mono); font-size:13px; color:hsl(var(--muted-fg)); display:none; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .col-name { display:none; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>metric prefixes</h1>
      <p>value in every si prefix</p>
    </div>

    <label class="lbl" for="num">number</label>
    <input type="text" id="num" placeholder="1.5e9 or 1500000000" autofocus autocomplete="off" spellcheck="false">

    <div class="empty" id="empty">enter a number above</div>

    <table class="table" id="tbl" style="display:none">
      <thead>
        <tr>
          <th>prefix</th>
          <th class="col-name">name</th>
          <th>exponent</th>
          <th style="text-align:right">value</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>metric prefixes</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var PREFIXES = [
      {sym:'Y',  name:'yotta', exp:24},
      {sym:'Z',  name:'zetta', exp:21},
      {sym:'E',  name:'exa',   exp:18},
      {sym:'P',  name:'peta',  exp:15},
      {sym:'T',  name:'tera',  exp:12},
      {sym:'G',  name:'giga',  exp:9},
      {sym:'M',  name:'mega',  exp:6},
      {sym:'k',  name:'kilo',  exp:3},
      {sym:'h',  name:'hecto', exp:2},
      {sym:'da', name:'deca',  exp:1},
      {sym:'',   name:'(base)',exp:0},
      {sym:'d',  name:'deci',  exp:-1},
      {sym:'c',  name:'centi', exp:-2},
      {sym:'m',  name:'milli', exp:-3},
      {sym:'µ',  name:'micro', exp:-6},
      {sym:'n',  name:'nano',  exp:-9},
      {sym:'p',  name:'pico',  exp:-12},
      {sym:'f',  name:'femto', exp:-15},
      {sym:'a',  name:'atto',  exp:-18},
      {sym:'z',  name:'zepto', exp:-21},
      {sym:'y',  name:'yocto', exp:-24}
    ];

    var numEl = document.getElementById('num');
    var tbl = document.getElementById('tbl');
    var tbody = document.getElementById('tbody');
    var empty = document.getElementById('empty');

    function fmt(v) {
      if (v === 0) return '0';
      var abs = Math.abs(v);
      if (abs >= 0.001 && abs < 1e15) {
        // Use toPrecision for clean output
        var s = parseFloat(v.toPrecision(7)).toString();
        return s;
      }
      return v.toExponential(5);
    }

    function findNatural(val) {
      // find prefix where value is in [1, 1000)
      if (val === 0) return 10; // base
      var log = Math.log10(Math.abs(val));
      // find closest prefix exp where val/10^exp is in [1,1000)
      var best = 10; // base index
      var bestScore = Infinity;
      PREFIXES.forEach(function(p, i) {
        var scaled = Math.abs(val) / Math.pow(10, p.exp);
        if (scaled >= 1 && scaled < 1000) {
          var score = Math.abs(p.exp);
          if (score < bestScore) { bestScore = score; best = i; }
        }
      });
      return best;
    }

    function run() {
      var raw = numEl.value.trim();
      if (!raw) {
        tbl.style.display = 'none';
        empty.style.display = '';
        return;
      }
      var val = Number(raw);
      if (isNaN(val)) {
        tbl.style.display = 'none';
        empty.textContent = 'invalid number';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';
      tbl.style.display = '';

      var naturalIdx = findNatural(val);
      tbody.innerHTML = '';

      PREFIXES.forEach(function(p, i) {
        var factor = Math.pow(10, p.exp);
        var scaled = val / factor;
        var abs = Math.abs(scaled);
        // show all rows but dim the very large/small ones
        var tr = document.createElement('tr');
        if (i === naturalIdx) tr.className = 'natural';
        var symDisp = p.sym || '—';
        tr.innerHTML =
          '<td class="col-sym">' + symDisp + '</td>' +
          '<td class="col-name">' + p.name + '</td>' +
          '<td class="col-exp">10<sup>' + p.exp + '</sup></td>' +
          '<td class="col-val">' + fmt(scaled) + '<span class="unit">' + p.sym + '</span></td>';
        tbody.appendChild(tr);
      });
    }

    numEl.addEventListener('input', run);
    empty.textContent = 'enter a number above';
    empty.style.display = '';
  })();
</script>
</body>
</html>
