<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dice — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  .presets { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; }
  .preset-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:5px 12px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .preset-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:6px; }
  .input-row { display:flex; gap:8px; margin-bottom:8px; }
  input[type="text"] { flex:1; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:14px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; }
  input[type="text"]:focus { border-color:hsl(var(--fg-dim)); }
  input[type="text"]::placeholder { color:hsl(var(--muted-fg)); }
  .roll-btn { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:10px 18px; font-family:var(--mono); font-size:12px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; white-space:nowrap; }
  .roll-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }

  .err { font-family:var(--mono); font-size:12px; color:hsl(0 60% 55%); margin-bottom:12px; min-height:18px; }

  .result-area { margin-top:4px; margin-bottom:24px; display:none; }
  .total-line { font-family:var(--mono); font-size:28px; color:hsl(var(--fg)); font-weight:500; margin-bottom:6px; }
  .breakdown { font-family:var(--mono); font-size:13px; color:hsl(var(--fg-dim)); word-break:break-all; }

  .history-lbl { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:8px; }
  .history { border-top:1px solid hsl(var(--rule)); }
  .history-row { display:flex; justify-content:space-between; align-items:baseline; padding:8px 0; border-bottom:1px solid hsl(var(--rule)); gap:12px; }
  .history-expr { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); }
  .history-total { font-family:var(--mono); font-size:14px; color:hsl(var(--fg)); }
  .history-detail { font-family:var(--mono); font-size:11px; color:hsl(var(--fg-dim)); flex:1; text-align:right; word-break:break-all; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .total-line { font-size:22px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="/tools/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>dice</h1>
      <p>d20-style dice notation roller</p>
    </div>

    <div class="presets">
      <button class="preset-btn" data-expr="1d4">d4</button>
      <button class="preset-btn" data-expr="1d6">d6</button>
      <button class="preset-btn" data-expr="1d8">d8</button>
      <button class="preset-btn" data-expr="1d10">d10</button>
      <button class="preset-btn" data-expr="1d12">d12</button>
      <button class="preset-btn" data-expr="1d20">d20</button>
      <button class="preset-btn" data-expr="1d100">d100</button>
      <button class="preset-btn" data-expr="4d6kh3">4d6kh3</button>
      <button class="preset-btn" data-expr="2d20kh1">adv</button>
      <button class="preset-btn" data-expr="2d20kl1">dis</button>
    </div>

    <label class="lbl" for="expr-in">dice notation</label>
    <div class="input-row">
      <input type="text" id="expr-in" placeholder="e.g. 3d6, 2d20+5, 4d6kh3" autocomplete="off" spellcheck="false">
      <button class="roll-btn" id="roll-btn">roll</button>
    </div>
    <div class="err" id="err-msg"></div>

    <div class="result-area" id="result-area">
      <div class="total-line" id="total-line"></div>
      <div class="breakdown" id="breakdown"></div>
    </div>

    <div class="history-lbl" id="hist-lbl" style="display:none">recent rolls</div>
    <div class="history" id="history"></div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>dice</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function(){
    var exprIn = document.getElementById('expr-in');
    var rollBtn = document.getElementById('roll-btn');
    var errEl = document.getElementById('err-msg');
    var resultArea = document.getElementById('result-area');
    var totalLine = document.getElementById('total-line');
    var breakdownEl = document.getElementById('breakdown');
    var historyEl = document.getElementById('history');
    var histLbl = document.getElementById('hist-lbl');
    var recentRolls = [];

    function randInt(max) {
      var buf = new Uint32Array(1);
      var limit = Math.floor(0xFFFFFFFF / max) * max;
      do { crypto.getRandomValues(buf); } while (buf[0] >= limit);
      return (buf[0] % max) + 1;
    }

    // Parse: [N]d<sides>[kh<k>|kl<k>][+/-mod]
    // e.g. 3d6, 2d20+5, 4d6kh3, 1d8-2, d20
    function parse(expr) {
      expr = expr.trim().toLowerCase().replace(/\s/g,'');
      var re = /^(\d*)d(\d+)(kh\d+|kl\d+)?([+-]\d+)?$/;
      var m = expr.match(re);
      if (!m) throw new Error('invalid notation — try 3d6, 2d20+5, 4d6kh3');
      var count = m[1] === '' ? 1 : parseInt(m[1], 10);
      var sides = parseInt(m[2], 10);
      var keep = null;
      if (m[3]) {
        var keepHigh = m[3][1] === 'h';
        var keepN = parseInt(m[3].slice(2), 10);
        keep = { high: keepHigh, n: keepN };
      }
      var mod = m[4] ? parseInt(m[4], 10) : 0;
      if (count < 1 || count > 100) throw new Error('count must be 1–100');
      if (sides < 2 || sides > 10000) throw new Error('sides must be 2–10000');
      if (keep && (keep.n < 1 || keep.n > count)) throw new Error('keep count out of range');
      return { count: count, sides: sides, keep: keep, mod: mod, expr: expr };
    }

    function roll(parsed) {
      var rolls = [];
      for (var i = 0; i < parsed.count; i++) rolls.push(randInt(parsed.sides));
      var kept = rolls.slice();
      var dropped = [];
      if (parsed.keep) {
        var sorted = rolls.slice().sort(function(a,b){ return b-a; });
        if (parsed.keep.high) {
          var threshold = sorted[parsed.keep.n - 1];
          var keptCount = 0;
          kept = []; dropped = [];
          rolls.forEach(function(r) {
            if (keptCount < parsed.keep.n && r >= threshold) { kept.push(r); keptCount++; }
            else dropped.push(r);
          });
        } else {
          var sortedAsc = rolls.slice().sort(function(a,b){ return a-b; });
          var threshL = sortedAsc[parsed.keep.n - 1];
          var keptCountL = 0;
          kept = []; dropped = [];
          rolls.forEach(function(r) {
            if (keptCountL < parsed.keep.n && r <= threshL) { kept.push(r); keptCountL++; }
            else dropped.push(r);
          });
        }
      }
      var total = kept.reduce(function(a,b){ return a+b; }, 0) + parsed.mod;
      return { rolls: rolls, kept: kept, dropped: dropped, total: total, parsed: parsed };
    }

    function formatBreakdown(res) {
      var parts = res.rolls.map(function(r) {
        var dropped = res.dropped.indexOf(r) !== -1;
        // simple: just show all rolls, mark dropped
        return dropped ? '(' + r + ')' : r;
      });
      // recalculate which are dropped properly
      if (res.parsed.keep) {
        var droppedSet = res.dropped.slice();
        parts = res.rolls.map(function(r) {
          var idx = droppedSet.indexOf(r);
          if (idx !== -1) { droppedSet.splice(idx, 1); return '[' + r + ']'; }
          return String(r);
        });
      }
      var s = parts.join(', ');
      if (res.parsed.mod !== 0) {
        var sign = res.parsed.mod > 0 ? '+' : '';
        s += ' ' + sign + res.parsed.mod;
      }
      return s;
    }

    function addHistory(res) {
      recentRolls.unshift(res);
      if (recentRolls.length > 10) recentRolls.pop();
      historyEl.innerHTML = '';
      histLbl.style.display = '';
      recentRolls.forEach(function(r) {
        var row = document.createElement('div');
        row.className = 'history-row';
        var expr = document.createElement('span');
        expr.className = 'history-expr';
        expr.textContent = r.parsed.expr;
        var tot = document.createElement('span');
        tot.className = 'history-total';
        tot.textContent = r.total;
        var detail = document.createElement('span');
        detail.className = 'history-detail';
        detail.textContent = formatBreakdown(r);
        row.appendChild(expr);
        row.appendChild(tot);
        row.appendChild(detail);
        historyEl.appendChild(row);
      });
    }

    function doRoll() {
      var expr = exprIn.value;
      errEl.textContent = '';
      if (!expr.trim()) return;
      var parsed, res;
      try {
        parsed = parse(expr);
        res = roll(parsed);
      } catch(e) {
        errEl.textContent = e.message;
        resultArea.style.display = 'none';
        return;
      }
      totalLine.textContent = '= ' + res.total;
      breakdownEl.textContent = formatBreakdown(res);
      resultArea.style.display = '';
      addHistory(res);
    }

    rollBtn.addEventListener('click', doRoll);
    exprIn.addEventListener('keydown', function(e){ if (e.key === 'Enter') doRoll(); });

    document.querySelectorAll('.preset-btn').forEach(function(btn) {
      btn.addEventListener('click', function(){
        exprIn.value = btn.dataset.expr;
        doRoll();
      });
    });
  })();
</script>
</body>
</html>
