<!doctype html>
<!-- dep: tesseract.js@5.1.0 via cdn.jsdelivr.net (~10MB WASM, loads on first use) -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ocr — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }
  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }
  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }

  /* tool-specific */
  .notice { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; margin-bottom:20px; line-height:1.6; }
  .drop-zone { border:1px dashed hsl(var(--border)); border-radius:4px; padding:32px; text-align:center; cursor:pointer; transition:border-color 150ms ease, background 150ms ease; margin-bottom:20px; }
  .drop-zone:hover, .drop-zone.drag-over { border-color:hsl(var(--fg-dim)); background:hsl(var(--accent)); }
  .drop-zone input[type=file] { display:none; }
  .drop-label { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); }
  .drop-label span { color:hsl(var(--fg-dim)); text-decoration:underline; text-underline-offset:2px; cursor:pointer; }
  .progress-wrap { margin-bottom:16px; display:none; }
  .progress-wrap.visible { display:block; }
  .progress-lbl { font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); margin-bottom:6px; }
  .progress-bar { height:4px; background:hsl(var(--muted)); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:hsl(var(--fg-dim)); width:0%; transition:width 200ms ease; border-radius:2px; }
  .lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:0 0 6px; }
  textarea { width:100%; min-height:200px; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:12px 14px; font-family:var(--mono); font-size:12px; line-height:1.6; color:hsl(var(--fg)); outline:none; resize:vertical; transition:border-color 150ms ease; }
  textarea:focus { border-color:hsl(var(--fg-dim)); }
  .copy-btn { margin-top:8px; appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:5px 10px; font-family:var(--mono); font-size:11px; border-radius:3px; cursor:pointer; transition:background 120ms ease, color 120ms ease; }
  .copy-btn:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); }
  .result { display:none; }
  .result.visible { display:block; }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>ocr</h1>
      <p>image → text (offline, in-browser)</p>
    </div>

    <div class="notice">this tool loads ~10 MB of wasm on first use. processing happens entirely in your browser — no data is sent anywhere.</div>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" aria-label="Choose image file for OCR">
      <div class="drop-label">drop an image here or <span id="browse-lbl">browse</span></div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-lbl" id="progress-lbl">loading…</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="result" id="result">
      <label class="lbl" for="ocr-out">extracted text</label>
      <textarea id="ocr-out" readonly placeholder="text will appear here…"></textarea>
      <button class="copy-btn" id="copy-btn">copy</button>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>ocr</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var dropZone = document.getElementById('drop-zone');
    var fileInput = document.getElementById('file-input');
    var browseLbl = document.getElementById('browse-lbl');
    var progressWrap = document.getElementById('progress-wrap');
    var progressLbl = document.getElementById('progress-lbl');
    var progressFill = document.getElementById('progress-fill');
    var result = document.getElementById('result');
    var ocrOut = document.getElementById('ocr-out');
    var copyBtn = document.getElementById('copy-btn');

    var worker = null;
    var busy = false;

    async function getWorker() {
      if (!worker) {
        worker = await Tesseract.createWorker('eng', 1, {
          logger: function (m) {
            if (m.status === 'recognizing text') {
              var pct = Math.round(m.progress * 100);
              progressFill.style.width = pct + '%';
              progressLbl.textContent = 'recognizing… ' + pct + '%';
            } else if (m.status) {
              progressLbl.textContent = m.status;
            }
          }
        });
      }
      return worker;
    }

    async function runOCR(file) {
      if (busy) return;
      busy = true;
      progressWrap.classList.add('visible');
      progressFill.style.width = '0%';
      progressLbl.textContent = 'loading engine…';
      result.classList.remove('visible');
      ocrOut.value = '';
      try {
        var w = await getWorker();
        progressLbl.textContent = 'recognizing…';
        var res = await w.recognize(file);
        ocrOut.value = res.data.text.trim();
        result.classList.add('visible');
        progressWrap.classList.remove('visible');
      } catch (e) {
        progressLbl.textContent = 'error: ' + e.message;
        progressFill.style.width = '0%';
      }
      busy = false;
    }

    browseLbl.addEventListener('click', function () { fileInput.click(); });
    dropZone.addEventListener('click', function (e) { if (e.target !== browseLbl) fileInput.click(); });
    dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      var f = e.dataTransfer.files[0]; if (f) runOCR(f);
    });
    fileInput.addEventListener('change', function () { if (fileInput.files[0]) runOCR(fileInput.files[0]); });

    copyBtn.addEventListener('click', function () {
      navigator.clipboard.writeText(ocrOut.value).then(function () {
        var o = copyBtn.textContent; copyBtn.textContent = 'copied';
        setTimeout(function () { copyBtn.textContent = o; }, 900);
      });
    });
  })();
</script>
</body>
</html>
