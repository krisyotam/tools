<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dns — tools</title>
<script>(function(){try{var t=localStorage.getItem('tools-theme');var d=t||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.classList.add(d);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  label.lbl { display:block; font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin:18px 0 6px; }
  .query-row { display:flex; gap:8px; align-items:stretch; }
  input[type="text"] { flex:1; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:13px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; min-width:0; }
  input:focus { border-color:hsl(var(--fg-dim)); }
  input::placeholder { color:hsl(var(--muted-fg)); }
  select { appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--mono); font-size:12px; color:hsl(var(--fg)); outline:none; cursor:pointer; transition:border-color 150ms ease; }
  select:focus { border-color:hsl(var(--fg-dim)); }
  .lookup-btn { appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); padding:0 16px; font-family:var(--mono); font-size:12px; border-radius:4px; cursor:pointer; white-space:nowrap; transition:background 120ms ease, color 120ms ease; }
  .lookup-btn:hover { color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .msg { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); margin-top:10px; min-height:18px; }
  .msg.err { color: hsl(0 60% 50%); }

  .result-wrap { margin-top:20px; border-top:1px solid hsl(var(--rule)); border-bottom:1px solid hsl(var(--rule)); }
  table { width:100%; border-collapse:collapse; }
  thead tr { border-bottom:1px solid hsl(var(--rule)); }
  th { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); padding:10px 8px; text-align:left; }
  td { font-family:var(--mono); font-size:12px; color:hsl(var(--fg)); padding:10px 8px; border-bottom:1px solid hsl(var(--border)); word-break:break-all; }
  tbody tr:last-child td { border-bottom:none; }
  .empty { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); padding:16px 8px; }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } .query-row { flex-wrap:wrap; } select { width:100%; } .lookup-btn { width:100%; padding:10px; } }
</style>
</head>
<body>
 <div class="page">
  <div class="grow">
  <main class="shell">
    <div class="nav">
      <a class="back" href="./"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>tools</a>
      <button class="toggle" data-theme-toggle aria-label="Switch to dark"><svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg><svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg></button>
    </div>
    <div class="head">
      <h1>dns</h1>
      <p>doh lookup (cloudflare)</p>
    </div>

    <label class="lbl" for="domain">domain</label>
    <div class="query-row">
      <input type="text" id="domain" placeholder="example.com" autocomplete="off" spellcheck="false">
      <select id="rtype" aria-label="Record type">
        <option>A</option><option>AAAA</option><option>MX</option>
        <option>TXT</option><option>NS</option><option>CNAME</option><option>SOA</option>
      </select>
      <button class="lookup-btn" id="lookup">lookup</button>
    </div>
    <div class="msg" id="msg"></div>

    <div class="result-wrap" id="result-wrap" style="display:none">
      <table>
        <thead><tr><th>type</th><th>ttl</th><th>data</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </main>
  </div>

  <footer>
    <div class="foot-inner">
      <span>dns</span>
      <span><a href="https://github.com/krisyotam/tools" rel="noopener">github.com/krisyotam/tools</a></span>
    </div>
  </footer>
 </div>

<script>
  (function(){var b=document.querySelector('[data-theme-toggle]');function p(){var d=document.documentElement.classList.contains('dark');b.setAttribute('aria-label',d?'Switch to light':'Switch to dark');}p();b.addEventListener('click',function(){var h=document.documentElement;var d=h.classList.contains('dark');h.classList.remove('dark','light');var n=d?'light':'dark';h.classList.add(n);try{localStorage.setItem('tools-theme',n);}catch(e){}p();});})();

  (function () {
    var domEl   = document.getElementById('domain');
    var rtypeEl = document.getElementById('rtype');
    var lookupBtn = document.getElementById('lookup');
    var msgEl   = document.getElementById('msg');
    var tbody   = document.getElementById('tbody');
    var wrap    = document.getElementById('result-wrap');

    // Map number codes → string labels
    var TYPE_MAP = {1:'A',2:'NS',5:'CNAME',6:'SOA',12:'PTR',15:'MX',16:'TXT',28:'AAAA',33:'SRV',99:'SPF',257:'CAA'};

    function setMsg(t, isErr) {
      msgEl.textContent = t;
      msgEl.className = 'msg' + (isErr ? ' err' : '');
    }

    function typeLabel(n) { return TYPE_MAP[n] || 'TYPE' + n; }

    function parseData(ans) {
      // ans.data is the answer; for some types it may need formatting
      return ans.data !== undefined ? String(ans.data) : '';
    }

    async function lookup() {
      var name = domEl.value.trim();
      if (!name) { setMsg('enter a domain name', true); return; }
      setMsg('querying…', false);
      wrap.style.display = 'none';
      tbody.innerHTML = '';
      lookupBtn.disabled = true;
      try {
        var url = 'https://cloudflare-dns.com/dns-query?name=' + encodeURIComponent(name) + '&type=' + encodeURIComponent(rtypeEl.value);
        var res = await fetch(url, {headers:{Accept:'application/dns-json'}});
        if (!res.ok) { setMsg('DoH error: ' + res.status, true); return; }
        var data = await res.json();
        var answers = data.Answer || [];
        if (!answers.length) {
          setMsg('no records found', false);
          var tr = document.createElement('tr');
          tr.innerHTML = '<td colspan="3" class="empty">no records</td>';
          tbody.appendChild(tr);
          wrap.style.display = '';
          return;
        }
        answers.forEach(function (a) {
          var tr = document.createElement('tr');
          var tdType = document.createElement('td'); tdType.textContent = typeLabel(a.type);
          var tdTTL  = document.createElement('td'); tdTTL.textContent  = a.TTL;
          var tdData = document.createElement('td'); tdData.textContent = parseData(a);
          tr.appendChild(tdType); tr.appendChild(tdTTL); tr.appendChild(tdData);
          tbody.appendChild(tr);
        });
        wrap.style.display = '';
        setMsg(answers.length + ' record' + (answers.length !== 1 ? 's' : ''), false);
      } catch (e) {
        setMsg('network error: ' + e.message, true);
      } finally {
        lookupBtn.disabled = false;
      }
    }

    lookupBtn.addEventListener('click', lookup);
    domEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') lookup(); });
    domEl.addEventListener('blur', function () { if (domEl.value.trim()) lookup(); });
  })();
</script>
</body>
</html>
