<style>
  :root { --bg:0 0% 100%; --fg:0 0% 20%; --fg-dim:0 0% 35%; --muted:0 0% 92%; --muted-fg:0 0% 50%; --border:0 0% 88%; --rule:0 0% 82%; --accent:0 0% 96%; --serif:'Lora',ui-serif,Georgia,serif; --sans:'Inter',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  html.dark { --bg:0 0% 7%; --fg:0 0% 96%; --fg-dim:0 0% 78%; --muted:0 0% 12%; --muted-fg:0 0% 60%; --border:0 0% 17%; --rule:0 0% 22%; --accent:0 0% 11%; }
  html.dark { color-scheme: dark; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background: hsl(var(--bg)); color: hsl(var(--fg)); }
  body { font-family: var(--sans); font-size:15px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  .page { min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }
  .grow { flex-grow:1; }
  .shell { width:100%; max-width:640px; margin:0 auto; padding:32px 32px 56px; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; }
  .back { font-family:var(--mono); font-size:12px; color:hsl(var(--muted-fg)); text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:color 120ms ease; }
  .back:hover { color:hsl(var(--fg)); }
  .back svg { width:12px; height:12px; }
  .toggle { appearance:none; background:transparent; border:1px solid hsl(var(--border)); color:hsl(var(--fg-dim)); width:32px; height:32px; border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:background 120ms ease, color 120ms ease, border-color 120ms ease; }
  .toggle:hover { background:hsl(var(--accent)); color:hsl(var(--fg)); border-color:hsl(var(--rule)); }
  .toggle svg { width:16px; height:16px; }
  .toggle .icon-sun { display:none; }
  .toggle .icon-moon { display:block; }
  html.dark .toggle .icon-sun { display:block; }
  html.dark .toggle .icon-moon { display:none; }
  .head { margin-bottom:28px; }
  .head h1 { font-family:var(--serif); font-weight:500; font-size:28px; letter-spacing:-0.01em; line-height:1.15; margin-bottom:4px; }
  .head p { font-family:var(--serif); font-style:italic; font-size:14px; color:hsl(var(--muted-fg)); }

  input[type="text"] { width:100%; appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; padding:10px 14px; font-family:var(--sans); font-size:15px; color:hsl(var(--fg)); outline:none; transition:border-color 150ms ease; margin-bottom:20px; }
  input[type="text"]:focus { border-color:hsl(var(--fg-dim)); }
  input[type="text"]::placeholder { color:hsl(var(--muted-fg)); }

  .section-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:hsl(var(--muted-fg)); margin-bottom:10px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap:6px; margin-bottom:20px; }
  .emoji-btn { appearance:none; background:hsl(var(--accent)); border:1px solid hsl(var(--border)); border-radius:4px; cursor:pointer; padding:8px 4px 6px; display:flex; flex-direction:column; align-items:center; gap:3px; transition:background 120ms ease, border-color 120ms ease; min-height:72px; justify-content:center; }
  .emoji-btn:hover { background:hsl(var(--muted)); border-color:hsl(var(--rule)); }
  .emoji-btn .glyph { font-size:28px; line-height:1; }
  .emoji-btn .name { font-family:var(--mono); font-size:9px; color:hsl(var(--muted-fg)); text-align:center; line-height:1.3; word-break:break-word; }
  .emoji-btn .cp { font-family:var(--mono); font-size:8px; color:hsl(var(--border)); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:hsl(var(--fg)); color:hsl(var(--bg)); font-family:var(--mono); font-size:12px; padding:7px 16px; border-radius:3px; opacity:0; pointer-events:none; transition:opacity 150ms ease; }
  .toast.show { opacity:1; }
  .no-result { font-family:var(--mono); font-size:13px; color:hsl(var(--muted-fg)); }

  footer { width:100%; max-width:640px; margin:0 auto; padding:20px 32px 28px; }
  .foot-inner { padding-top:18px; border-top:1px solid hsl(var(--rule)); font-family:var(--mono); font-size:11px; color:hsl(var(--muted-fg)); display:flex; justify-content:space-between; }
  footer a { color:inherit; text-decoration:underline; text-underline-offset:2px; text-decoration-color:hsl(var(--border)); }
  footer a:hover { text-decoration-color:hsl(var(--muted-fg)); }

  @media (max-width:560px) { .shell { padding:22px 22px 40px; } footer { padding:12px 22px 24px; } .head h1 { font-size:24px; } }
</style>

    function codepoint(emoji) {
      var cp = emoji.codePointAt(0).toString(16).toUpperCase();
      return 'U+' + cp;
    }

    var RECENTLY_KEY = 'emoji-recent';
    function getRecent() { try { return JSON.parse(localStorage.getItem(RECENTLY_KEY)) || []; } catch(e){ return []; } }
    function addRecent(em) {
      var r = getRecent().filter(function(e){ return e !== em; });
      r.unshift(em);
      r = r.slice(0,16);
      try { localStorage.setItem(RECENTLY_KEY, JSON.stringify(r)); } catch(e){}
    }

    var toast = document.getElementById('toast');
    var toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ toast.classList.remove('show'); }, 1200);
    }

    function makeCard(row) {
      var btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.setAttribute('aria-label', 'Copy ' + row[1]);
      btn.innerHTML = '<span class="glyph">' + row[0] + '</span><span class="name">' + row[1] + '</span><span class="cp">' + codepoint(row[0]) + '</span>';
      btn.addEventListener('click', function() {
        navigator.clipboard.writeText(row[0]).then(function() {
          addRecent(row[0]);
          renderRecent();
          showToast('copied ' + row[0]);
        });
      });
      return btn;
    }

    var recentWrap = document.getElementById('recently-wrap');
    var recentGrid = document.getElementById('recently');

    function renderRecent() {
      var r = getRecent();
      if (!r.length) { recentWrap.style.display = 'none'; return; }
      recentWrap.style.display = '';
      recentGrid.innerHTML = '';
      r.forEach(function(em) {
        var row = EMOJIS.find(function(e){ return e[0] === em; });
        if (row) recentGrid.appendChild(makeCard(row));
      });
    }

    var resultsGrid = document.getElementById('results');
    var resultsLabel = document.getElementById('results-label');
    var noResult = document.getElementById('no-result');
    var searchEl = document.getElementById('search');

    function renderResults(list) {
      resultsGrid.innerHTML = '';
      if (!list.length) { noResult.style.display = ''; resultsGrid.style.display = 'none'; return; }
      noResult.style.display = 'none';
      resultsGrid.style.display = '';
      list.forEach(function(row) { resultsGrid.appendChild(makeCard(row)); });
    }

    function run() {
      var q = searchEl.value.trim().toLowerCase();
      if (!q) {
        resultsLabel.textContent = 'all emojis';
        renderResults(EMOJIS);
        return;
      }
      resultsLabel.textContent = 'results';
      var matches = EMOJIS.filter(function(row) {
        return (row[1] + ' ' + row[2]).includes(q);
      });
      renderResults(matches);
    }

    searchEl.addEventListener('input', run);
    renderRecent();
    renderResults(EMOJIS);
  })();
